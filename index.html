<br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">2.</span></b><span style=\"font-family:黑体\">工作任务</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">在快速发展的零售行业中，商家面临着巨大的竞争压力，需要精准地了解消费者行为、优化库存管理、预测销售趋势以及提升顾客体验。为了应对这些挑战，某大型连锁超市决定部署一套智能零售分析系统，该系统将利用人工智能和大数据分析来提升其业务效率和客户满意度。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">智能零售分析系统的目标包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">提高销售转化率和客户忠诚度。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">减少库存成本，避免滞销和断货。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">降低运营成本，提高供应链效率。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">加强市场竞争力，快速响应市场变化。</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">智能零售分析系统的业务需求包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">顾客行为分析：收集顾客购物习惯、偏好和购买频率，以便于定制个性化营销策略。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">库存优化：实时监测货架上的商品存量，预测补货需求，减少过度库存和缺货情况。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">销售预测：基于历史销售数据和市场趋势，预测未来销售，辅助决策。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">动态定价：根据供需关系、竞争对手价格变动等因素，动态调整商品价格。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">客户满意度提升：通过分析顾客反馈和评论，识别服务短板，改进服务质量。</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">你作为一名人工智能训练师，根据上述的智能零售分析系统的系统目标和业务需求，补全智能零售分析系统的数据采集和处理指导方案（见素材文件夹中的4.2.1.docx）。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号</span>+<span style=\"font-family:宋体\">身份证号后六位”。</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能指导五级/初级工、四级/中级工解决数据采集、处理问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（2）能指导五级/初级工、四级/中级工优化数据采集、处理问题</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）数据采集和处理的指导方案内容合理、可行；<br>\n（2）数据采集全面；</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（3）数据处理准确与完整。</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.2.1文档题1","y":"填空题","b":{"p":"智能零售分析系统数据采集和处理指导方案\n\n1. 数据源确定\n\n销售点（POS）数据：从收银系统获取交易记录，包括商品种类、数量、价格和购买时间。\n\n顾客信息：会员卡使用数据，包括 {{1}} \n\n库存管理系统：实时库存量、入库和出库记录。\n\n顾客反馈：在线评价、投诉和建议。\n\n外部数据：天气预报、节假日信息、竞争对手价格数据。\n\n2. 数据采集方法\n\nAPI接口：与内部系统（如POS、CRM）和外部数据提供商建立API连接，自动化数据抓取。\n\n传感器和物联网设备：在货架上安装RFID标签和重量传感器，监测商品存量。\n\n社交媒体监听：通过社交媒体API监听品牌相关的公众讨论和评价。\n\n顾客调查：定期发送电子问卷，收集顾客反馈。\n\n3. 数据预处理\n\n清洗： {{2}}\n\n标准化：{{3}} \n\n整合：将来自不同来源的数据合并到单一数据库中，创建关联字段。\n\n4. 数据安全与合规\n\n加密传输：确保数据在传输过程中的安全。\n\n访问控制：限制对敏感数据的访问权限，只允许授权人员查看。\n\n匿名化处理：对个人信息进行去标识化，遵守GDPR等数据保护法规。\n\n5. 数据存储与管理\n\n云存储：选择可靠的云服务商，如AWS或Azure，存储海量数据。\n\n备份与恢复：定期备份数据，并测试恢复流程，以防数据丢失。\n\n6. 数据分析与应用\n\n建模： {{4}} \n\n可视化：开发仪表板展示关键指标，帮助管理层做出决策。\n\n报告：定期生成销售、库存和顾客满意度报告，提供业务洞察。\n\n通过上述方案，智能零售分析系统能够有效地采集、处理和分析大量数据，为企业提供决策支持，最终达到 {{5}}的目标。","a":[{"i":"1","a":"会员基本信息、消费记录和积分兑换。"},{"i":"2","a":"去除重复、错误或无关的数据项。"},{"i":"3","a":"统一数据格式，例如日期和时间的表示方式。"},{"i":"4","a":"使用机器学习算法预测销售趋势、顾客偏好和库存需求。"},{"i":"5","a":"提升业务效率和顾客满意度"}]}}]},{"i":"4.2.2","s":"人工智能训练师三级4.2.2","d":"初级","m":{"难度":"初级","子题数量":"1","总分":"5","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"layout-grid-mode:char\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span style=\"font-size:16.0pt\"><span style=\"line-height:150%\"><span style=\"font-family:宋体\"><span style=\"letter-spacing:2.0pt\">人工智能训练师（三级）操作技能考核</span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">准考证号：</span>&nbsp; &nbsp;</span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题代码：</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题名称：</span>AI<span style=\"font-family:黑体\">辅助的医疗影像诊断系统数据采集和处理指导</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">考核时间</span><span style=\"font-family:黑体\">：</span>10min</span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">1.</span></b><span style=\"font-family:黑体\">场地设备要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">人工智能训练师主机：</span>CPU<span style=\"font-family:黑体\">（</span>intel i5 <span style=\"font-family:黑体\">及以上）、内存（不少于</span> 16GB<span style=\"font-family:黑体\">）、操作系统（</span>windows10<span style=\"font-family:黑体\">）、办公软件；</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">2.</span></b><span style=\"font-family:黑体\">工作任务</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">随着医疗科技的进步，AI在医疗影像诊断领域的应用日益广泛。AI辅助的医疗影像诊断系统能够通过深度学习技术，分析X射线、CT、MRI等医学影像，帮助医生更快速、更准确地识别病灶，评估病情，尤其在早期癌症筛查、骨伤评估、神经系统疾病诊断等方面展现出巨大潜力。这种系统不仅提高了诊断效率，降低了误诊率，还为偏远地区或医疗资源匮乏的地方提供了高水平的医疗影像分析服务。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span lang=\"EN-US\" style=\"font-family:宋体\">AI</span><span style=\"font-family:宋体\">辅助的医疗影像诊断系统的目标包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">提高诊断准确率：利用AI技术，辅助医生识别细微的病灶特征，减少漏诊和误诊；</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">加速诊断流程：自动化分析影像，缩短医生等待影像分析结果的时间，加快治疗进程；</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">个性化诊疗方案：基于AI分析的结果，为患者提供更为精准的个性化治疗建议；</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">医疗资源均衡分配：通过远程诊断，协助基层医疗机构提高诊疗水平，缩小城乡医疗差距；</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">你作为一名人工智能训练师，根据上述的AI辅助的医疗影像诊断系统的系统目标，补全AI辅助的医疗影像诊断系统的数据采集和处理指导方案（见素材文件夹中4.2.2.docx）。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号</span>+<span style=\"font-family:宋体\">身份证号后六位”。</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能指导五级/初级工、四级/中级工解决数据采集、处理问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（2）能指导五级/初级工、四级/中级工优化数据采集、处理问题</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）数据采集和处理的指导方案内容合理可行；<br>\n（2）确保医疗影像数据采集完整和准确性；</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（3）统一数据格式和标准化处理流程。</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.2.2文档题1","y":"填空题","b":{"p":"AI辅助的医疗影像诊断系统数据采集和处理指导方案\n\n1. 数据采集方案\n\n医学影像获取：确保影像质量，使用高分辨率的医疗设备获取清晰的影像资料，涵盖多种疾病类型和人群。\n\n患者信息收集：在符合HIPAA等隐私保护法规的前提下，收集患者的病史、年龄、性别等基本信息，以及相关的实验室检查结果。\n\n  {{1}}：邀请经验丰富的医生对影像进行标注，标记病灶位置、类型、大小等关键信息，作为训练AI模型的标注数据集。\n\n数据脱敏处理：对收集的患者信息进行脱敏处理，确保患者隐私安全。\n\n2. 数据处理方案\n\n数据清洗与预处理： {{2}}\n\n模型训练与验证：{{3}}\n\n模型测试与优化：{{4}} \n\n系统集成与部署：将训练好的模型集成到医疗影像诊断系统中，部署在医院的服务器上，确保医生可以随时调用AI分析结果。\n\n3. 数据安全与隐私保护\n\n所有数据传输和存储过程都需加密，防止数据泄露。\n\n遵守HIPAA等隐私法规，确保患者信息不被非法访问或滥用。\n\n使用数据脱敏技术，如差分隐私，保护患者身份不被识别。\n\n4. 系统优化与升级\n\n定期收集医生和患者的反馈，评估系统性能，根据实际需求调整AI模型。\n\n不断更新训练数据集，加入新的疾病类型或变异特征，提高 {{5}}\n\n跟踪AI技术的最新进展，适时引入更先进的算法，提升系统性能。","a":[{"i":"1","a":"医学影像标注"},{"i":"2","a":"对医学影像进行标准化处理，包括图像增强、噪声去除、尺寸统一化等，确保数据质量；对患者信息进行缺失值处理、异常值检测和数据格式统一。"},{"i":"3","a":"使用标注好的数据集进行模型训练，采用交叉验证方法评估模型性能，确保模型的准确性和可靠性。"},{"i":"4","a":"在独立的测试集上评估模型性能，根据测试结果进行参数调优和模型改进，提高诊断准确率。"},{"i":"5","a":"模型的泛化能力和诊断准确率。"}]}}]},{"i":"4.2.3","s":"人工智能训练师三级4.2.3","d":"初级","m":{"难度":"初级","子题数量":"1","总分":"5","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"layout-grid-mode:char\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span style=\"font-size:16.0pt\"><span style=\"line-height:150%\"><span style=\"font-family:宋体\"><span style=\"letter-spacing:2.0pt\">人工智能训练师（三级）操作技能考核</span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">准考证号：</span>&nbsp; &nbsp;</span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题代码：</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题名称：</span>AI<span style=\"font-family:黑体\">智能安防监控系统采集和处理指导</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">考核时间：</span>10min</span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">1.</span></b><span style=\"font-family:黑体\">场地设备要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">人工智能训练师主机：</span>CPU<span style=\"font-family:黑体\">（</span>intel i5 <span style=\"font-family:黑体\">及以上）、内存（不少于</span> 16GB<span style=\"font-family:黑体\">）、操作系统（</span>windows10<span style=\"font-family:黑体\">）、办公软件；</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">2.</span></b><span style=\"font-family:黑体\">工作任务</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">在现代社会，公共安全和个人隐私保护成为人们日益关注的焦点。AI智能安防监控系统利用计算机视觉、深度学习和大数据分析技术，能够在公共场所、住宅区、企业园区等场景下，实时监测异常行为，预警潜在威胁，同时保护正常活动的隐私不受侵犯。系统通过摄像头捕捉视频流，利用AI算法分析人物行为、车辆移动、物品遗留等情况，自动识别可疑活动，如闯入禁区、夜间徘徊、暴力冲突等，并及时通知安保人员，有效提升安全管理水平。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span lang=\"EN-US\" style=\"font-family:宋体\">AI</span><span style=\"font-family:宋体\">智能安防监控系统的目标包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">实时监测与异常行为识别：通过视频分析，即时发现并标记异常行为，减少人工监控的盲点。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">隐私保护：在识别异常行为的同时，确保普通人的日常活动不被过度关注，尊重个人隐私。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">快速响应：一旦发现紧急情况，立即触发警报，通知相关人员或机构，加快响应速度。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">数据分析与报告：对监控数据进行长期分析，为安全策略的制定和优化提供数据支持。</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">你作为一名人工智能训练师，根据上述的AI智能安防监控系统的目标，补全AI智能安防监控系统的数据采集和处理指导方案（见素材文件夹中的4.2.3.docx）。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号</span>+<span style=\"font-family:宋体\">身份证号后六位”。</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能指导五级/初级工、四级/中级工解决数据采集、处理问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（2）能指导五级/初级工、四级/中级工优化数据采集、处理问题</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）数据采集和处理的指导方案内容合理可行；<br>\n（2）确保智能安防监控数据采集完整和准确性；</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（3）统一数据格式和标准化处理流程。</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.2.3文档题1","y":"填空题","b":{"p":"AI智能安防监控系统采集和处理指导方案\n\n1. 数据采集方法\n\n高清视频流采集：部署高清摄像头，确保视频画面清晰，便于AI算法识别细节。\n\n多角度覆盖：合理布置摄像头，确保 {{1}}无死角，覆盖所有入口、出口和敏感区域。\n\n夜间与低光环境适应：使用带有红外夜视功能的摄像头，保证夜间或低光条件下仍能捕捉到清晰图像。\n\n数据传输与存储：采用稳定的数据传输网络，确保视频流的实时传输，同时建立安全的 {{2}}，保存原始视频和分析结果。\n\n2. 数据处理方案\n\n视频流预处理： {{3}}\n\n行为分析与异常检测：{{4}} \n\n隐私保护算法：在不影响异常行为识别的前提下，对视频中无关个体进行模糊处理，保护个人隐私。\n\n数据融合与决策支持：结合多个摄像头的数据，进行空间和时间上的数据融合，构建更全面的场景理解，为安全决策提供依据。\n\n3. 系统优化与安全措施\n\n算法优化：持续训练和优化AI模型，提升 {{5}} \n\n隐私合规：确保系统设计和运营遵守GDPR、CCPA等数据保护法规，定期进行隐私影响评估。\n\n安全防护：实施数据加密、访问控制和防火墙等安全措施，防止数据泄露和系统被攻击。","a":[{"i":"1","a":"监控区域"},{"i":"2","a":"数据存储系统"},{"i":"3","a":"对视频流进行降噪、去模糊、光照均衡等处理，提高图像质量；进行帧率调整和分辨率统一，确保后续分析的稳定性。"},{"i":"4","a":"使用深度学习算法识别异常行为模式，如入侵、徘徊、聚集等；结合时间序列分析，检测不符合正常行为模式的活动。"},{"i":"5","a":"异常行为检测的准确率和实时性，减少误报和漏报。"}]}}]},{"i":"4.2.4","s":"人工智能训练师三级4.2.4","d":"初级","m":{"难度":"初级","子题数量":"1","总分":"5","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"layout-grid-mode:char\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span style=\"font-size:16.0pt\"><span style=\"line-height:150%\"><span style=\"font-family:宋体\"><span style=\"letter-spacing:2.0pt\">人工智能训练师（三级）操作技能考核</span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">准考证号：</span>&nbsp; &nbsp;</span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题代码：</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题名称：自动驾驶汽车感知系统数据采集与标注指导</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">考核时间：</span>10min</span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">1.</span></b><span style=\"font-family:黑体\">场地设备要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">人工智能训练师主机：</span>CPU<span style=\"font-family:黑体\">（</span>intel i5 <span style=\"font-family:黑体\">及以上）、内存（不少于</span> 16GB<span style=\"font-family:黑体\">）、操作系统（</span>windows10<span style=\"font-family:黑体\">）、办公软件；</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">2.</span></b><span style=\"font-family:黑体\">工作任务</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">随着自动驾驶技术的不断进步，汽车行业正向着更高的自动化水平迈进。自动驾驶汽车的感知系统是实现这一目标的关键技术之一，它通过各种传感器（如摄像头、雷达、激光雷达等）收集环境信息，然后通过AI算法处理这些数据，使车辆能够识别周围的障碍物、道路状况、交通标志等，从而做出安全的驾驶决策。为了训练这些AI算法，需要大量高质量的标注数据，以确保自动驾驶汽车在各种驾驶环境下都能够准确地感知和理解环境。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">自动驾驶汽车感知系统的业务需求包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">数据多样性：系统需要收集覆盖各种天气条件、不同时间、不同地域以及各种驾驶场景的数据，以确保AI模型的泛化能力。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">高精度标注：对收集到的数据进行精细标注，包括但不限于车辆、行人、自行车、动物、交通标志、车道线、红绿灯等。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">实时数据处理：系统应能实时接收和处理来自车辆传感器的数据流，以支持即时的决策制定。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">数据安全性：确保数据在采集、传输和存储过程中的安全性，遵守相关数据保护法规。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">高效数据管理：提供数据检索、数据集构建、数据清洗和数据版本控制等功能，以支持数据科学家和工程师的工作。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">持续学习与更新：系统应支持模型的持续训练和优化，以适应不断变化的道路环境和交通规则。</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">你作为一名人工智能训练师，根据上述的自动驾驶汽车感知系统的业务需求，补全自动驾驶汽车感知系统的数据采集和数据标注指导方案（见素材文件夹中的4.2.4.docx）。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号</span>+<span style=\"font-family:宋体\">身份证号后六位”。</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能指导五级/初级工、四级/中级工解决数据采集问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（2）能指导五级/初级工、四级/中级工解决数据标注问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（3）能指导五级/初级工、四级/中级工优化数据采集、数据标注问题</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）数据采集和标注的指导方案内容合理可行；<br>\n（2）确保数据采集和标注的完整和准确性；</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.2.4文档题1","y":"填空题","b":{"p":"自动驾驶汽车感知系统数据采集与标注指导方案\n\n1. 数据采集方案\n\n多传感器融合： {{1}}\n\n场景覆盖：{{2}} \n\n事件触发采集：在特定事件发生时（如紧急刹车、避让行动），自动触发额外数据采集，以捕获关键时刻。\n\n数据质量控制： {{3}}\n\n数据加密与传输：采用安全的数据传输协议，确保数据在传输过程中的安全性。\n\n2. 数据标注方案\n\n定义标注标准：明确标注类别、边界框精度要求、遮挡处理规则等。\n\n选择标注工具：使用专业的数据标注软件，支持2D框、3D框、语义分割等标注类型。\n\n  {{4}}：对标注员进行专业培训，确保他们理解标注标准，熟悉工具使用。\n\n执行标注任务：分配数据给标注团队，设定清晰的任务指标和截止日期。\n\n质量控制与复查：实施多级检查，包括自动检查和人工复查，确保标注的准确性和一致性。\n\n数据整合与存储：将标注后的数据整合，形成 {{5}}数据集，存储在安全的数据仓库中，供模型训练使用。","a":[{"i":"1","a":"整合摄像头、激光雷达、毫米波雷达等多种传感器数据，实现全方位环境感知，提高系统可靠性。"},{"i":"2","a":"覆盖各种天气条件（晴天、雨天、雪天）、不同时段（白天、夜晚）、各类道路（城市道路、高速公路、乡村道路）和特殊场景（施工区、学校区）。"},{"i":"3","a":"建立数据采集标准，包括传感器校准、数据同步、采样率控制等；定期进行设备维护和校准，确保数据质量。"},{"i":"4","a":"标注员培训与认证"},{"i":"5","a":"结构化的训练"}]}}]},{"i":"4.2.5","s":"人工智能训练师三级4.2.5","d":"初级","m":{"难度":"初级","子题数量":"1","总分":"5","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"layout-grid-mode:char\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span style=\"font-size:16.0pt\"><span style=\"line-height:150%\"><span style=\"font-family:宋体\"><span style=\"letter-spacing:2.0pt\">人工智能训练师（三级）操作技能考核</span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">准考证号：</span>&nbsp; &nbsp;</span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题代码：</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">试题名称：智能化数据标注在文化遗产数字化保护中的应用指导</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">考核时间：</span>10min</span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">1.</span></b><span style=\"font-family:黑体\">场地设备要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">人工智能训练师主机：</span>CPU<span style=\"font-family:黑体\">（</span>intel i5 <span style=\"font-family:黑体\">及以上）、内存（不少于</span> 16GB<span style=\"font-family:黑体\">）、操作系统（</span>windows10<span style=\"font-family:黑体\">）、办公软件；</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">2.</span></b><span style=\"font-family:黑体\">工作任务</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">文化遗产是人类历史和文明的重要载体，包括艺术、建筑、手工艺品、文献等，它们承载着丰富的人文价值和历史信息。然而，随着时间的流逝，许多文化遗产面临着自然侵蚀、人为破坏以及缺乏有效保护手段的威胁。近年来，数字化技术，尤其是人工智能和机器学习，为文化遗产的保护和传承提供了新的机遇。通过高精度的图像和三维模型采集，结合智能化数据标注，可以创建文化遗产的数字档案，不仅能够永久保存文化遗产的状态，还能为修复、研究和公众教育提供丰富的资源。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">智能化数据标注在文化遗产数字化保护中的业务需求包括：</span></span></span></span>\n\n<ol start=\"12\" style=\"list-style-type:lower-alpha\">\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">高精度标注：为了确保数字化模型的准确性和完整性，需要对文化遗产的每一个细节进行精确标注，包括文物的材质、纹理、结构特征、损伤区域等。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">自动化与智能化：利用AI技术，实现对文化遗产图像和三维模型的自动化分析和标注，减少人力成本，提高工作效率。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">多维度数据融合：结合不同来源和类型的图像、视频、三维扫描数据，创建综合性的文化遗产数字档案。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">跨学科协作：促进文化遗产专家、数据科学家和AI工程师之间的合作，共同推进文化遗产的数字化保护。</span></span></span></span></li>\n\t<li align=\"left\" style=\"margin-left:16px; text-align:left\" value=\"50\"><span style=\"font-size:12pt\"><span style=\"line-height:150%\"><span style=\"font-family:Calibri,sans-serif\"><span style=\"font-family:宋体\">数据安全与隐私保护：确保数字化文化遗产数据的安全存储和合法使用，尊重文化遗产持有者的权利和利益。</span></span></span></span></li>\n</ol>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">你作为一名人工智能训练师，根据上述内容，补全智能化数据标注在文化遗产数字化保护中的应用指导方案（见素材文件夹中的4.2.5.docx）。</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号</span>+<span style=\"font-family:宋体\">身份证号后六位”。</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能指导五级/初级工、四级/中级工解决数据采集问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（2）能指导五级/初级工、四级/中级工解决数据标注问题</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（3）能指导五级/初级工、四级/中级工优化数据采集、数据标注问题</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）数据采集和标注的指导方案内容合理可行；<br>\n（2）确保数据采集和标注的完整和准确性；</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.2.5文档题1","y":"填空题","b":{"p":"智能化数据标注在文化遗产数字化保护中的应用指导方案\n\n1. 数据标注工具与方法\n\n图像标注：\n\n使用 {{1}}等标注工具，为文化遗产图像添加边界框、多边形、点、线段等标注。\n\n对于复杂的文物细节，可以使用语义分割或实例分割技术，精细到每个物体的每一部分。\n\n三维模型标注：\n\n采用MeshLab或Blender等软件，对3D模型进行顶点、面、体素级别的标注。\n\n实现对模型内部结构和外部特征的全面标注。\n\n属性标签：\n\n文物的材料、风格、时代、作者、位置等元数据，使用CSV、JSON等格式记录，并关联至相应的图像或模型。\n\n可以使用数据库管理系统（如MySQL、MongoDB）来存储和管理这些信息。\n\n2. 智能化辅助标注\n\n深度学习模型：训练 {{2}}的模型，如Mask R-CNN、U-Net等，用于自动识别和标记文物的特定特征。\n\n模型训练数据集：构建一个包含大量已标注文化遗产图像的数据集，用于模型训练和验证。\n\n模型迭代与优化：定期更新模型，引入新发现的文物类型和特征，提升识别精度。\n\n3. 跨学科团队协作\n\n组建由考古学家、艺术史家、计算机视觉专家、AI工程师组成的 {{3}}团队，共同制定标注标准和工作流程。\n\n定期举行会议，讨论标注过程中的问题，调整标注策略。\n\n4. 数据安全与隐私保护\n\n使用 {{4}}存储和传输数据，确保文化遗产信息不被非法获取。\n\n遵守相关法律法规，特别是涉及文化遗产的所有权和使用权的规定。\n\n5. 用户体验与公众教育\n\n开发Web应用或移动应用程序，允许用户在线浏览、搜索和学习文化遗产的数字化资料。\n\n利用 {{5}}技术，为用户提供沉浸式文化遗产体验，增加教育和娱乐价值。\n\n6. 技术融合与未来展望\n\n探索区块链技术的应用，为文化遗产的数字档案提供不可篡改的记录，增强其权威性和可信度。\n\n结合AI和物联网技术，监测和预警文化遗产的物理状态变化，及时采取保护措施。","a":[{"i":"1","a":"LabelImg、CVAT、VGG Image Annotator"},{"i":"2","a":"基于计算机视觉和深度学习"},{"i":"3","a":"多学科交叉"},{"i":"4","a":"加密数据库和安全的网络传输协议"},{"i":"5","a":"虚拟现实(VR)和增强现实(AR)"}]}}]}];
// ====== 操作题模块 ======
const PRACTICAL = typeof PRACTICAL_DATA !== 'undefined' ? PRACTICAL_DATA : [];
let currentPracticalIdx = 0;

function isLongAnswer(text) {
  return text.includes('<') || text.length > 50;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderPractical() {
  const q = PRACTICAL[currentPracticalIdx];
  if (!q) {
    document.getElementById('pracContainer').innerHTML = '<p style="color:var(--text-light);padding:40px;text-align:center;">暂无操作题数据</p>';
    updatePracNav();
    return;
  }

  const meta = q.m || {};
  const subs = q.q || [];

  // 标题 & 元信息
  let html = `
    <div class="prac-header">
      <div class="prac-meta">
        <span class="q-tag">${q.i}</span>
        <span class="q-tag diff-${diffClass(q.d)}">${q.d || ''}</span>
        <span class="q-summary">${escHtml(q.s || '')}</span>
      </div>
      <div class="prac-info">
        ${meta.子题数量 ? `<span>子题: ${meta.子题数量}</span>` : ''}
        ${meta.总分 ? `<span>总分: ${meta.总分}</span>` : ''}
        ${meta.预计时长 ? `<span>时长: ${meta.预计时长}</span>` : ''}
      </div>
    </div>`;

  // 阅读材料 (折叠)
  if (q.r) {
    html += `
      <details class="prac-reading" ${subs.length === 0 ? 'open' : ''}>
        <summary>📄 阅读材料</summary>
        <div class="prac-reading-body">${q.r}</div>
      </details>`;
  }

  // 子题目
  if (subs.length === 0 && !q.r) {
    html += '<p style="color:var(--text-light);text-align:center;padding:20px;">该题暂无子题目</p>';
  }

  subs.forEach((sub, si) => {
    const body = sub.b || {};
    const template = body.p || '';
    const blanks = body.a || [];

    html += `<div class="prac-subq" data-sub="${si}">`;
    html += `<div class="prac-subq-title">${escHtml(sub.t || sub.y || `第 ${sub.n || si+1} 题`)}</div>`;

    if (blanks.length === 0) {
      // 无空白，直接渲染模板为代码
      html += `<pre class="prac-code">${escHtml(template)}</pre>`;
    } else {
      // 判断是否为"大篇幅答案"模式
      const allLong = blanks.every(b => isLongAnswer(b.a));
      // 判断模板是否包含实质代码（含 import/def/=等关键字才算代码）
      const cleaned = template.replace(/\{\{\d+\}\}/g, '').trim();
      const hasCode = /(?:import |def |class |return |print\(|\.\w+\(|\w+\s*=\s*|data\[|pd\.|np\.)/.test(cleaned);
      
      if (allLong && !hasCode) {
        // 纯问答模式：直接显示答案（非等宽字体，紧凑排版）
        html += `<div class="prac-answer-prose">`;
        blanks.forEach(b => {
          if (b.a.includes('<')) {
            html += `<div class="prac-ans-block">${b.a}</div>`;
          } else {
            html += `<pre class="prac-code">${escHtml(b.a)}</pre>`;
          }
        });
        html += `</div>`;
      } else if (allLong && hasCode) {
        // 代码+长答案模式
        let filled = template;
        blanks.forEach(b => {
          filled = filled.replace(`{{${b.i}}}`, `<span class="prac-answer-inline">${b.a}</span>`);
        });
        html += `<pre class="prac-code prac-code-answered">${filled}</pre>`;
      } else {
        // 填空模式：将模板中的 {{N}} 替换为 input
        let parts = template.split(/(\{\{\d+\}\})/);
        let codeHtml = '';
        parts.forEach(part => {
          const m = part.match(/^\{\{(\d+)\}\}$/);
          if (m) {
            const blank = blanks.find(b => String(b.i) === m[1]);
            if (blank) {
              const ans = blank.a;
              if (isLongAnswer(ans)) {
                // 单个长答案也直接显示
                codeHtml += `<span class="prac-answer-inline">${ans}</span>`;
              } else {
                const val = escHtml(ans);
                codeHtml += `<input type="text" class="prac-input" 
                  data-answer="${val}"
                  value="" placeholder="..." 
                  style="min-width:6ch;width:6ch"
                  ondblclick="revealPracAnswer(this)"
                  oninput="autoGrowInput(this)"
                  onkeydown="pracInputKeydown(event)">`;
              }
            }
          } else {
            codeHtml += escHtml(part);
          }
        });
        html += `<pre class="prac-code">${codeHtml}</pre>`;
        
        // 显示/隐藏答案按钮
        html += `<div class="prac-actions">
          <button class="btn btn-outline btn-sm" onclick="togglePracAnswers(this)">👁 显示本空答案</button>
        </div>`;
      }
    }

    html += `</div>`;
  });

  document.getElementById('pracContainer').innerHTML = html;
  updatePracNav();
  updatePracChapterNav();
}

function updatePracNav() {
  const total = PRACTICAL.length;
  document.getElementById('pracInfo').textContent = total ? `${currentPracticalIdx + 1} / ${total}` : '0 / 0';
  document.getElementById('pracPrev').disabled = currentPracticalIdx <= 0;
  document.getElementById('pracNext').disabled = currentPracticalIdx >= total - 1;
}

function updatePracChapterNav() {
  const container = document.getElementById('pracChapterNav');
  const chapters = {};
  PRACTICAL.forEach((q, i) => {
    const ch = q.i.split('.')[0];
    if (!chapters[ch]) chapters[ch] = [];
    chapters[ch].push(i);
  });
  
  let html = '';
  Object.entries(chapters).forEach(([ch, indices]) => {
    const active = indices.includes(currentPracticalIdx);
    html += `<span class="prac-chapter ${active ? 'active' : ''}">`;
    html += `<span class="prac-ch-title">第${ch}章</span>`;
    html += `<span class="prac-ch-items">`;
    indices.forEach(idx => {
      const q = PRACTICAL[idx];
      const isActive = idx === currentPracticalIdx;
      html += `<span class="prac-ch-item ${isActive ? 'active' : ''}" 
        onclick="window._gotoPrac(${idx})" title="${q.s || q.i}">${q.i.split('.')[1]}.${q.i.split('.')[2]}</span>`;
    });
    html += `</span></span>`;
  });
  container.innerHTML = html;
}

window._gotoPrac = function(idx) {
  currentPracticalIdx = idx;
  renderPractical();
};

function pracGoPrev() {
  if (currentPracticalIdx > 0) { currentPracticalIdx--; renderPractical(); }
}
function pracGoNext() {
  if (currentPracticalIdx < PRACTICAL.length - 1) { currentPracticalIdx++; renderPractical(); }
}

// Input auto-grow
function autoGrowInput(el) {
  const len = el.value.length || 1;
  el.style.width = `min(${Math.max(6, len + 2)}ch, 95%)`;
  if (el.value.length === 0) el.style.width = '6ch';
}

// Reveal single answer (double-click)
function revealPracAnswer(el) {
  const ans = el.dataset.answer;
  if (!ans) return;
  if (el.classList.contains('revealed')) {
    el.value = '';
    el.classList.remove('revealed');
  } else {
    el.value = ans;
    el.classList.add('revealed');
    autoGrowInput(el);
  }
}

// Toggle all answers in sub-question
function togglePracAnswers(btn) {
  const container = btn.closest('.prac-subq');
  const inputs = container.querySelectorAll('.prac-input');
  const allRevealed = Array.from(inputs).every(inp => inp.classList.contains('revealed'));
  
  inputs.forEach(inp => {
    if (allRevealed) {
      inp.value = '';
      inp.classList.remove('revealed');
    } else {
      inp.value = inp.dataset.answer;
      inp.classList.add('revealed');
      autoGrowInput(inp);
    }
  });
  
  btn.textContent = allRevealed ? '👁 显示本空答案' : '🔒 隐藏本空答案';
}

// Keyboard: Cmd+Enter / Ctrl+Enter
function pracInputKeydown(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    revealPracAnswer(e.target);
  }
}

// ====== Init practical from tab switch ======
function initPractical() {
  const btn = document.querySelector('[data-type="practical"]');
  if (btn) document.getElementById('pracCount').textContent = PRACTICAL.length;
  if (PRACTICAL.length > 0) renderPractical();
}

// ====== 常量 ======
const DATA = { single: [], multi: [], judge: [] };
const LOG_KEY = 'practice_logs';
const WRONG_KEY = 'wrong_records';
const VERSION_KEY = 'practice_version';

let currentType = 'single';
let currentNum = 1;
let wrongIndex = 0;
let answered = false;
let answerRevealed = false;
let logs = [];
let wrongQids = [];  // 当前错题列表 (排序后的 qid 数组)

// ====== 工具函数 ======
function getData() { return DATA[currentType]; }

function getQuestion() {
  if (currentType === 'wrong') return getWrongQuestion();
  const arr = getData();
  const pfx = { single:'single', multi:'multi', judge:'judge' }[currentType];
  return arr.find(q => parseInt(q.i.replace(pfx, '')) === currentNum);
}

function getWrongQuestion() {
  const qid = wrongQids[wrongIndex];
  if (!qid) return null;
  const prefix = qid.startsWith('single') ? 'single' : qid.startsWith('multi') ? 'multi' : 'judge';
  const num = parseInt(qid.replace(prefix, ''));
  return DATA[prefix].find(q => parseInt(q.i.replace(prefix, '')) === num);
}

function typeLabel(t) {
  return { single:'单选题', multi:'多选题', judge:'判断题' }[t];
}

function diffClass(d) {
  return d === '初级' ? 'easy' : d === '中级' ? 'mid' : 'hard';
}

function qidPrefix(qid) {
  if (qid.startsWith('single')) return 'single';
  if (qid.startsWith('multi')) return 'multi';
  return 'judge';
}

function qidNum(qid) {
  return parseInt(qid.replace(qidPrefix(qid), ''));
}

// ====== 错题集管理 ======
function getWrongRecords() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY)) || {}; } catch { return {}; }
}
function saveWrongRecords(wr) {
  localStorage.setItem(WRONG_KEY, JSON.stringify(wr));
  rebuildWrongQids(wr);
  updateWrongCount();
}
function rebuildWrongQids(wr) {
  wrongQids = Object.keys(wr || {}).sort();
}
function getProgress(qid) {
  const wr = getWrongRecords();
  const recs = wr[qid] || [];
  return { current: recs.filter(r => r.correct).length, total: 3 };
}
function isMastered(qid) {
  const wr = getWrongRecords();
  const recs = wr[qid];
  return !recs || (recs.length === 3 && recs.every(r => r.correct));
}
function updateWrongRecord(qid, correct, userAns, correctAns) {
  const wr = getWrongRecords();
  if (!wr[qid]) wr[qid] = [];
  wr[qid].unshift({ time: new Date().toLocaleString('zh-CN'), correct, userAns, correctAns });
  if (wr[qid].length > 3) wr[qid] = wr[qid].slice(0, 3);

  // 三连对 → 移出错题集
  const mastered = wr[qid].length === 3 && wr[qid].every(r => r.correct);
  if (mastered) {
    delete wr[qid];
  }
  saveWrongRecords(wr);

  // 如果当前在错题模式，掌握后自动跳到下一题
  if (mastered && currentType === 'wrong') {
    setTimeout(() => showMasteryToast(qid), 300);
    if (wrongQids.length === 0) {
      // 没有更多错题了
      setTimeout(() => render(), 500);
    } else if (wrongIndex >= wrongQids.length) {
      wrongIndex = wrongQids.length - 1;
      setTimeout(() => render(), 500);
    }
  }
}

function updateWrongCount() {
  const el = document.getElementById('wrongCount');
  if (el) el.textContent = wrongQids.length;
}

// ====== 渲染 ======
function render() {
  const q = getQuestion();
  if (!q) {
    if (currentType === 'wrong' && wrongQids.length === 0) {
      document.getElementById('qText').textContent = '🎉 暂无错题，继续保持！';
    } else {
      document.getElementById('qText').textContent = `⚠ 未找到题目`;
    }
    document.getElementById('optionsContainer').innerHTML = '';
    document.getElementById('qTag').textContent = '-';
    document.getElementById('qDiff').textContent = '-';
    document.getElementById('qSummary').textContent = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('qNum').disabled = false;
    updateNavInfo();
    return;
  }

  const isWrongMode = currentType === 'wrong';
  const actualType = isWrongMode ? qidPrefix(q.i) : currentType;

  document.getElementById('qTag').textContent = typeLabel(actualType);
  const diffEl = document.getElementById('qDiff');
  diffEl.textContent = q.d || '中级';
  diffEl.className = 'q-tag diff-' + diffClass(q.d);
  document.getElementById('qSummary').textContent = q.s || '';
  document.getElementById('qText').textContent = q.q || '';

  // 错题进度条
  const pb = document.getElementById('progressBar');
  if (isWrongMode) {
    const prog = getProgress(q.i);
    const pct = (prog.current / 3) * 100;
    pb.style.display = 'block';
    pb.innerHTML = `
      <div class="prog-label">📌 错题训练 · 已连续答对 <strong>${prog.current}</strong>/3</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>`;
  } else {
    pb.style.display = 'none';
  }

  // 选项
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  answered = false;
  answerRevealed = false;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnShowAns').textContent = '👁 显示答案';

  const inputType = actualType === 'multi' ? 'checkbox' : 'radio';

  q.o.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'opt-item';
    div.dataset.label = opt.l;

    const input = document.createElement('input');
    input.type = inputType;
    input.name = `opt_${actualType}_${q.i}`;
    input.value = opt.l;
    input.id = `opt_${actualType}_${q.i}_${opt.l}`;

    const labelSpan = document.createElement('span');
    labelSpan.className = 'opt-label';
    labelSpan.textContent = opt.l + '.';

    const textSpan = document.createElement('span');
    textSpan.className = 'opt-text';
    textSpan.textContent = opt.t;

    div.appendChild(input);
    div.appendChild(labelSpan);
    div.appendChild(textSpan);
    div.addEventListener('click', e => {
      if (div.classList.contains('disabled')) return;
      const inp = div.querySelector('input');
      if (inputType === 'radio') {
        container.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        container.querySelectorAll('.opt-item').forEach(o => o.classList.remove('selected'));
      }
      inp.checked = !inp.checked;
      div.classList.toggle('selected', inp.checked);
    });
    container.appendChild(div);
  });

  updateNavInfo();
}

function updateNavInfo() {
  if (currentType === 'wrong') {
    const total = wrongQids.length;
    document.getElementById('navInfo').textContent = total ? `${wrongIndex + 1} / ${total}` : '0 / 0';
    document.getElementById('qNum').value = wrongIndex + 1;
    document.getElementById('qNum').max = total || 1;
    document.getElementById('qNum').disabled = false;
    document.getElementById('btnPrev').disabled = wrongIndex <= 0;
    document.getElementById('btnNext').disabled = wrongIndex >= total - 1;
  } else {
    const total = getData().length;
    document.getElementById('navInfo').textContent = `${currentNum} / ${total}`;
    document.getElementById('qNum').max = total;
    document.getElementById('qNum').value = currentNum;
    document.getElementById('qNum').disabled = false;
    document.getElementById('btnPrev').disabled = currentNum <= 1;
    document.getElementById('btnNext').disabled = currentNum >= total;
  }
}

// ====== 提交判对错 ======
document.getElementById('btnSubmit').addEventListener('click', function () {
  if (answered) return;
  const q = getQuestion();
  if (!q) return;

  const isWrongMode = currentType === 'wrong';
  const actualType = isWrongMode ? qidPrefix(q.i) : currentType;

  const container = document.getElementById('optionsContainer');
  const selected = [];
  container.querySelectorAll('input:checked').forEach(inp => selected.push(inp.value));
  selected.sort();

  const correctLabels = q.o.filter(o => o.c).map(o => o.l);
  correctLabels.sort();

  container.querySelectorAll('.opt-item').forEach(el => {
    el.classList.add('disabled');
    const label = el.dataset.label;
    const isC = correctLabels.includes(label);
    const isS = selected.includes(label);
    if (isC && isS) el.classList.add('correct');
    else if (isC && !isS) el.classList.add('missed');
    else if (!isC && isS) el.classList.add('wrong');
  });

  const isCorrect = JSON.stringify(selected) === JSON.stringify(correctLabels);
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `✅ <strong>回答正确！</strong><br>正确答案：<span class="fb-ans">${correctLabels.join('、')}</span>`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ <strong>回答错误</strong><br>你的答案：${selected.length ? selected.join('、') : '（未选）'}<br>正确答案：<span class="fb-ans">${correctLabels.join('、')}</span>`;
  }

  answered = true;
  answerRevealed = true;
  document.getElementById('btnShowAns').textContent = '🔒 隐藏答案';
  this.disabled = true;

  // 双写：logs + wrong_records
  if (isWrongMode) {
    logAttempt(q, selected, correctLabels, isCorrect, q.i);
  } else {
    logAttempt(q, selected, correctLabels, isCorrect);
  }
});

// ====== 显示/隐藏答案 ======
document.getElementById('btnShowAns').addEventListener('click', function () {
  const q = getQuestion();
  if (!q) return;
  const container = document.getElementById('optionsContainer');
  if (!answerRevealed) {
    const correctLabels = q.o.filter(o => o.c).map(o => o.l);
    container.querySelectorAll('.opt-item').forEach(el => {
      el.classList.add('disabled');
      if (correctLabels.includes(el.dataset.label)) el.classList.add('correct');
    });
    answerRevealed = true;
    this.textContent = '🔒 隐藏答案';
  } else if (!answered) {
    container.querySelectorAll('.opt-item').forEach(el => {
      el.classList.remove('disabled', 'correct', 'wrong', 'missed');
    });
    answerRevealed = false;
    this.textContent = '👁 显示答案';
  }
});

// ====== 下一题 ======
function goNext() {
  if (currentType === 'wrong') {
    if (wrongIndex < wrongQids.length - 1) { wrongIndex++; render(); }
  } else {
    if (currentNum < getData().length) { currentNum++; render(); }
  }
}
function goPrev() {
  if (currentType === 'wrong') {
    if (wrongIndex > 0) { wrongIndex--; render(); }
  } else {
    if (currentNum > 1) { currentNum--; render(); }
  }
}

document.getElementById('btnPrev').addEventListener('click', goPrev);
document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnNextQ').addEventListener('click', goNext);
document.getElementById('qNum').addEventListener('change', function () {
  if (currentType === 'wrong') {
    let v = parseInt(this.value) || 1;
    if (v < 1) v = 1;
    if (v > wrongQids.length) v = wrongQids.length;
    wrongIndex = v - 1;
    render();
  } else {
    let v = parseInt(this.value) || 1;
    const total = getData().length;
    if (v < 1) v = 1;
    if (v > total) v = total;
    currentNum = v;
    render();
  }
});

// ====== 掌握提示 ======
let toastTimer = null;
function showMasteryToast(qid) {
  const old = document.getElementById('masteryToast');
  if (old) old.remove();
  const toast = document.createElement('div');
  toast.id = 'masteryToast';
  toast.className = 'mastery-toast';
  toast.textContent = `🎉 ${qid} 已三连对，移出错题集！`;
  document.body.appendChild(toast);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 2500);
}

// ====== Tab 切换 ======
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;

  // 显示/隐藏区域
  const theoryArea = document.querySelector('.theory-area');
  const practicalArea = document.getElementById('practicalArea');
  const logSection = document.getElementById('logSection');

  if (currentType === 'practical') {
    if (theoryArea) theoryArea.style.display = 'none';
    if (practicalArea) { practicalArea.style.display = 'block'; initPractical(); }
  } else {
    if (practicalArea) practicalArea.style.display = 'none';
    if (theoryArea) theoryArea.style.display = 'block';

    if (currentType === 'wrong') {
      const wr = getWrongRecords();
      rebuildWrongQids(wr);
      wrongIndex = 0;
    } else {
      currentNum = 1;
    }
    render();
  }
});

// ====== 日志管理 ======
function loadLogs() {
  try { logs = JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch { logs = []; }
}
function saveLogs() {
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));
  renderLogStats();
  renderLogTable();
  document.getElementById('hintLogCount').textContent = `日志: ${logs.length} 条`;
}
function logAttempt(q, selected, correctLabels, isCorrect, forcedQid) {
  loadLogs();
  const qid = forcedQid || q.i;
  logs.push({
    time: new Date().toLocaleString('zh-CN'),
    qid: qid, type: typeLabel(qidPrefix(qid)), summary: q.s || '',
    userAns: selected.join('、') || '（未选）',
    correctAns: correctLabels.join('、'),
    result: isCorrect ? '✓' : '✗'
  });
  saveLogs();

  // 双写 wrong_records
  updateWrongRecord(qid, isCorrect, selected.join('、') || '（未选）', correctLabels.join('、'));
}
function renderLogStats() {
  const total = logs.length;
  const correct = logs.filter(l => l.result === '✓').length;
  const wrong = total - correct;
  const rate = total ? (correct / total * 100).toFixed(1) : 0;
  const singleN = logs.filter(l => l.qid.startsWith('single')).length;
  const multiN = logs.filter(l => l.qid.startsWith('multi')).length;
  const judgeN = logs.filter(l => l.qid.startsWith('judge')).length;
  document.getElementById('logStats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">总答题数</div></div>
    <div class="stat-card"><div class="num green">${correct}</div><div class="label">正确数</div></div>
    <div class="stat-card"><div class="num red">${wrong}</div><div class="label">错误数</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="label">正确率</div></div>
    <div class="stat-card"><div class="num">${singleN}</div><div class="label">单选</div></div>
    <div class="stat-card"><div class="num">${multiN}</div><div class="label">多选</div></div>
    <div class="stat-card"><div class="num">${judgeN}</div><div class="label">判断</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${wrongQids.length}</div><div class="label">待掌握错题</div></div>`;
}
function renderLogTable() {
  const tbody = document.getElementById('logBody');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:20px;">暂无答题记录</td></tr>';
    return;
  }
  const recent = [...logs].reverse().slice(0, 100);
  tbody.innerHTML = recent.map(l => `<tr>
    <td>${l.time}</td><td><strong>${l.qid}</strong></td>
    <td>${l.userAns}</td><td>${l.correctAns}</td>
    <td><span class="badge ${l.result === '✓' ? 'badge-ok' : 'badge-fail'}">${l.result === '✓' ? '正确' : '错误'}</span></td>
  </tr>`).join('');
}

// ====== 导出/导入 ======
document.getElementById('btnExportLog').addEventListener('click', () => {
  if (!logs.length) { alert('暂无日志可导出'); return; }
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    practice_logs: logs,
    wrong_records: getWrongRecords()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `答题记录_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(blob);
});

document.getElementById('btnImportLog').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);

      if (!data.practice_logs) {
        alert('无效的导入文件：未找到做题记录');
        return;
      }

      const existCount = logs.length;
      const importCount = data.practice_logs.length;

      // 合并 practice_logs（去重，按 qid+time 去重）
      const existing = new Set(logs.map(l => l.qid + '|' + l.time));
      const merged = [...logs];
      let added = 0;
      data.practice_logs.forEach(l => {
        const key = l.qid + '|' + l.time;
        if (!existing.has(key)) { merged.push(l); added++; }
      });
      merged.sort((a, b) => new Date(a.time) - new Date(b.time));
      logs = merged;
      localStorage.setItem(LOG_KEY, JSON.stringify(logs));

      // 合并 wrong_records
      if (data.wrong_records) {
        const wr = getWrongRecords();
        const wrKeys = new Set(Object.keys(wr));
        Object.entries(data.wrong_records).forEach(([qid, recs]) => {
          if (wrKeys.has(qid)) {
            // 已有该题记录，合并去重（time-based）
            const existingTimes = new Set(wr[qid].map(r => r.time));
            recs.forEach(r => { if (!existingTimes.has(r.time)) wr[qid].push(r); });
            wr[qid].sort((a, b) => new Date(b.time) - new Date(a.time));
            wr[qid] = wr[qid].slice(0, 3);
          } else {
            wr[qid] = recs;
          }
          // 检查是否已掌握
          if (wr[qid].length === 3 && wr[qid].every(r => r.correct)) {
            delete wr[qid];
          }
        });
        saveWrongRecords(wr);
      }

      renderLogStats();
      renderLogTable();
      document.getElementById('hintLogCount').textContent = `日志: ${logs.length} 条`;
      alert(`✅ 导入完成！原有 ${existCount} 条，新增 ${added} 条，共 ${logs.length} 条记录`);
    } catch (err) {
      alert('导入失败：' + err.message);
    }
  };
  input.click();
});

document.getElementById('btnClearLog').addEventListener('click', () => {
  if (logs.length && confirm('确定清空所有答题记录和错题集？')) {
    logs = [];
    saveLogs();
    saveWrongRecords({});
    if (currentType === 'wrong') { currentType = 'single'; currentNum = 1; render(); }
    // 重置 tab 高亮
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.type === 'single');
    });
  }
});

document.getElementById('logToggle').addEventListener('click', () => {
  document.getElementById('logSection').classList.toggle('open');
  document.getElementById('logArrow').classList.toggle('open');
});

// ====== 键盘快捷键 ======
document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'Enter') document.getElementById('btnSubmit').click();
  if (e.key === 'a' || e.key === 'A') document.getElementById('btnShowAns').click();
});

// ====== 旧数据迁移 ======
function checkMigration() {
  const ver = localStorage.getItem(VERSION_KEY);
  const hasLogs = logs.length > 0;
  const hasWrong = Object.keys(getWrongRecords()).length > 0;

  // 新版已初始化过 wrong_records → 无需迁移
  if (hasWrong) return;

  // 有旧日志但无 wrong_records → 弹窗
  if (hasLogs) {
    const overlay = document.getElementById('migrateOverlay');
    if (overlay) {
      document.getElementById('migrateCount').textContent = logs.length;
      overlay.style.display = 'flex';
    }
  }
}

function doMigrate() {
  const wr = {};
  // 按题号分组
  const groups = {};
  logs.forEach(l => {
    if (!groups[l.qid]) groups[l.qid] = [];
    groups[l.qid].push({
      time: l.time,
      correct: l.result === '✓',
      userAns: l.userAns,
      correctAns: l.correctAns
    });
  });

  Object.entries(groups).forEach(([qid, recs]) => {
    // 取最近3条
    recs.sort((a, b) => new Date(b.time) - new Date(a.time));
    const recent = recs.slice(0, 3);
    // 只要最近3条中有任意一条答错过，就进错题集
    if (recent.some(r => !r.correct)) {
      wr[qid] = recent;
    }
    // 如果3条全对且长度=3，说明已掌握，不加入
  });

  saveWrongRecords(wr);
  const count = Object.keys(wr).length;
  document.getElementById('migrateOverlay').style.display = 'none';
  localStorage.setItem(VERSION_KEY, '2');
  document.getElementById('wrongCount').textContent = count;
  alert(`✅ 已导入错题集！识别到 ${count} 道需巩固的题目`);
}

function skipMigration() {
  document.getElementById('migrateOverlay').style.display = 'none';
  localStorage.setItem(VERSION_KEY, '2');
}

// ====== 初始化 ======
function init() {
  if (typeof QUESTION_DATA === 'undefined') {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--danger);font-size:40px;margin-bottom:12px;">⚠</div>' +
      '<div style="color:var(--text-light)">题库数据加载失败</div>' +
      '<div style="margin-top:12px;font-size:13px;color:var(--text-light)">' +
      '请确保 data.js 与 index.html 在同一目录</div>';
    return;
  }
  DATA.single = QUESTION_DATA.s;
  DATA.multi = QUESTION_DATA.m;
  DATA.judge = QUESTION_DATA.j;

  const s = DATA.single.length, m = DATA.multi.length, j = DATA.judge.length;
  document.getElementById('countSingle').textContent = s;
  document.getElementById('countMulti').textContent = m;
  document.getElementById('countJudge').textContent = j;
  document.getElementById('hintTotal').textContent = `题库: ${s + m + j} 题`;

  loadLogs();
  const wr = getWrongRecords();
  rebuildWrongQids(wr);
  updateWrongCount();
  renderLogStats();
  renderLogTable();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render();

  // 旧数据迁移检查
  checkMigration();
}

document.getElementById('btnMigrateYes').addEventListener('click', doMigrate);
document.getElementById('btnMigrateNo').addEventListener('click', skipMigration);

init();
</script>
