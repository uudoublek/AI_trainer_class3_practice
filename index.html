<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理论题库 · 答题练习</title>
<style>:root {
  --primary: #4f6ef7;
  --primary-light: #eef1ff;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-light);
}
.header-stats span { white-space: nowrap; }
.header-stats strong { color: var(--text); }

/* Main layout */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-light);
  transition: all .2s;
}
.tab-btn:hover { color: var(--text); background: var(--bg); }
.tab-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,110,247,.3);
}

/* Question navigator */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.nav-bar label {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 500;
}
.nav-bar input[type="number"] {
  width: 80px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
  outline: none;
}
.nav-bar input[type="number"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,110,247,.15);
}
.nav-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: all .15s;
}
.nav-btn:hover {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
}
.nav-btn:disabled { opacity: .4; cursor: default; }
.nav-info {
  font-size: 13px;
  color: var(--text-light);
  margin-left: auto;
}

/* Question card */
.q-card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 28px 24px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.q-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.q-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--primary-light);
  color: var(--primary);
}
.q-tag.diff-easy { background: #dcfce7; color: #16a34a; }
.q-tag.diff-mid  { background: #fef3c7; color: #d97706; }
.q-tag.diff-hard { background: #fee2e2; color: #dc2626; }
.q-summary {
  font-size: 13px;
  color: var(--text-light);
}
.q-text {
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 20px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.opt-item:hover { border-color: var(--primary); background: var(--primary-light); }
.opt-item input { margin-top: 3px; accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
.opt-item .opt-label {
  font-weight: 600;
  color: var(--primary);
  margin-right: 4px;
}
.opt-item .opt-text { line-height: 1.5; }

/* States for opt-item */
.opt-item.correct {
  border-color: var(--success);
  background: #f0fdf4;
}
.opt-item.correct .opt-label { color: var(--success); }
.opt-item.wrong {
  border-color: var(--danger);
  background: #fef2f2;
}
.opt-item.wrong .opt-label { color: var(--danger); }
.opt-item.missed {
  border-color: var(--warning);
  background: #fffbeb;
}
.opt-item.missed .opt-label { color: var(--warning); }
.opt-item.selected { border-color: var(--primary); background: var(--primary-light); }
.opt-item.disabled { pointer-events: none; }

/* Action bar */
.action-bar {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #3b5de7; box-shadow: 0 4px 12px rgba(79,110,247,.3); }
.btn-primary:disabled { opacity: .5; cursor: default; box-shadow: none; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.feedback.wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
.feedback .fb-ans { font-weight: 600; }

/* Log section */
.section-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}
.section-toggle:hover { color: var(--primary); }
.section-toggle .arrow { transition: transform .2s; }
.section-toggle .arrow.open { transform: rotate(90deg); }

#logSection { display: none; }
#logSection.open { display: block; }

.log-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.stat-card .num {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
}
.stat-card .num.green { color: var(--success); }
.stat-card .num.red { color: var(--danger); }
.stat-card .label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

.log-table-wrap {
  max-height: 400px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.log-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.log-table th {
  background: var(--bg);
  position: sticky;
  top: 0;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  z-index: 1;
}
.log-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.log-table tr:hover td { background: var(--bg); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
}
.badge-ok { background: #dcfce7; color: #16a34a; }
.badge-fail { background: #fee2e2; color: #dc2626; }

.log-tools {
  display: flex;
  gap: 8px;
  margin: 12px 0;
  flex-wrap: wrap;
}

/* Loading */
#loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
#loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Wrong tab */
.tab-wrong { color: var(--danger); }
.tab-wrong.active { background: var(--danger); color: #fff; box-shadow: 0 2px 8px rgba(239,68,68,.3); }
.tab-wrong:hover:not(.active) { color: var(--danger); background: #fef2f2; }

/* Progress bar (wrong questions) */
.progress-bar {
  margin-bottom: 16px;
  padding: 12px 18px;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 10px;
}
.prog-label {
  font-size: 13px;
  color: #92400e;
  margin-bottom: 6px;
}
.prog-label strong { color: var(--danger); font-size: 15px; }
.prog-track {
  height: 8px;
  background: #fde68a;
  border-radius: 4px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #f59e0b, var(--success));
  border-radius: 4px;
  transition: width .4s ease;
}

/* Mastery toast */
.mastery-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  box-shadow: 0 4px 20px rgba(34,197,94,.4);
  z-index: 999;
  animation: toastIn .3s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Dialog overlay */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.dialog {
  background: var(--card);
  border-radius: 16px;
  padding: 28px 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,.15);
}
.dialog-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}
.dialog-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-light);
  margin-bottom: 20px;
}
.dialog-body strong { color: var(--text); }
.dialog-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* Practical module */
.prac-chapter-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.prac-chapter {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
}
.prac-chapter.active { border-color: var(--primary); background: var(--primary-light); }
.prac-ch-title { font-weight: 600; color: var(--text-light); font-size: 11px; }
.prac-ch-items { display: flex; gap: 4px; flex-wrap: wrap; }
.prac-ch-item {
  padding: 2px 8px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-light);
  transition: all .15s;
}
.prac-ch-item:hover { background: var(--primary-light); color: var(--primary); }
.prac-ch-item.active { background: var(--primary); color: #fff; }

.prac-header {
  margin-bottom: 14px;
}
.prac-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.prac-info { display: flex; gap: 16px; font-size: 12px; color: var(--text-light); }

.prac-reading {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px 12px;
  margin-bottom: 16px;
  font-size: 14px;
}
.prac-reading summary {
  cursor: pointer;
  font-weight: 600;
  padding: 8px 0;
  color: var(--text);
}
.prac-reading-body {
  padding: 8px 0 12px;
  line-height: 1.7;
  max-height: 400px;
  overflow-y: auto;
}
.prac-reading-body p { margin-bottom: 8px; }
.prac-reading-body ol, .prac-reading-body ul { padding-left: 20px; }
.prac-reading-body li { margin-bottom: 4px; }

.prac-subq {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
}
.prac-subq-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 10px;
  color: var(--text);
}
.prac-code {
  background: #f8f9fa;
  color: #1e293b;
  border: 1px solid var(--border);
  padding: 16px 18px;
  border-radius: 10px;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
.prac-code-answered {
  background: #f0fdf4;
  border-left: 3px solid var(--success);
}
.prac-input {
  background: #ffffff;
  color: #1e293b;
  border: 1px solid #94a3b8;
  border-radius: 4px;
  padding: 1px 6px;
  font-family: inherit;
  font-size: inherit;
  outline: none;
  min-width: 6ch;
  max-width: 90%;
  transition: border-color .15s;
}
.prac-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,110,247,.3); }
.prac-input.revealed { background: #f0fdf4; border-color: var(--success); color: #166534; }
.prac-answer-inline {
  display: inline;
  color: #166534;
  background: #dcfce7;
  padding: 0 4px;
  border-radius: 3px;
}
.prac-answer-prose {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  line-height: 1.8;
  font-size: 14px;
}
.prac-ans-block {
  margin-bottom: 12px;
}
.prac-ans-block:last-child { margin-bottom: 0; }
.prac-ans-block p { margin-bottom: 8px; }
.prac-ans-block ol, .prac-ans-block ul { padding-left: 20px; margin-bottom: 8px; }
.prac-ans-block li { margin-bottom: 4px; }
.prac-ans-block strong { font-weight: 600; }
.prac-actions { margin-top: 10px; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 17px; }
  .q-card { padding: 20px 16px; }
  .q-text { font-size: 15px; }
  .action-bar .btn { flex: 1; text-align: center; }
  .nav-bar input[type="number"] { width: 64px; }
}
</style>
</head>
<body>
<div class="dialog-overlay" id="migrateOverlay" style="display:none">
  <div class="dialog">
    <div class="dialog-title">🔄 发现旧版做题记录</div>
    <div class="dialog-body">
      检测到你有 <strong id="migrateCount">0</strong> 条历史做题记录。<br>
      是否导入错题集？将根据历史答题情况标记需要巩固的题目。
    </div>
    <div class="dialog-actions">
      <button class="btn btn-primary" id="btnMigrateYes">✅ 导入错题集</button>
      <button class="btn btn-outline" id="btnMigrateNo">⏭ 以后再说</button>
    </div>
  </div>
</div>
<div class="header">
  <h1>📝 理论题库 · 答题练习</h1>
  <div class="header-stats">
    <span id="hintTotal">加载中…</span>
    <span id="hintLogCount">日志: 0 条</span>
  </div>
</div>
<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <div>正在加载题库…</div>
  </div>
  <div id="app" style="display:none">
    <div class="tabs" id="tabBar">
      <button class="tab-btn active" data-type="single">📖 单选题 <span id="countSingle">0</span></button>
      <button class="tab-btn" data-type="multi">📚 多选题 <span id="countMulti">0</span></button>
      <button class="tab-btn" data-type="judge">⚖️ 判断题 <span id="countJudge">0</span></button>
      <button class="tab-btn tab-wrong" data-type="wrong">❌ 错题集 <span id="wrongCount">0</span></button>
      <button class="tab-btn" data-type="practical">🛠 操作题 <span id="pracCount">0</span></button>
    </div>
    <div class="theory-area">
    <div class="nav-bar">
      <label>题号</label>
      <button class="nav-btn" id="btnPrev">◀</button>
      <input type="number" id="qNum" min="1" value="1">
      <button class="nav-btn" id="btnNext">▶</button>
      <span class="nav-info" id="navInfo">1 / 300</span>
    </div>
    <div id="progressBar" class="progress-bar" style="display:none"></div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-tag" id="qTag">单选题</span>
        <span class="q-tag" id="qDiff">中级</span>
        <span class="q-summary" id="qSummary">-</span>
      </div>
      <div class="q-text" id="qText">-</div>
      <div class="options" id="optionsContainer"></div>
      <div class="action-bar">
        <button class="btn btn-primary" id="btnSubmit">✅ 提交判对错</button>
        <button class="btn btn-outline" id="btnShowAns">👁 显示答案</button>
        <button class="btn btn-outline" id="btnNextQ">➡ 下一题</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    </div><!-- /theory-area -->

    <div id="practicalArea" style="display:none">
      <div class="nav-bar">
        <button class="nav-btn" id="pracPrev" onclick="pracGoPrev()">◀</button>
        <span class="nav-info" id="pracInfo">1 / 40</span>
        <button class="nav-btn" id="pracNext" onclick="pracGoNext()">▶</button>
      </div>
      <div id="pracChapterNav" class="prac-chapter-nav"></div>
      <div id="pracContainer"></div>
    </div>

    <div class="section-toggle" id="logToggle">
      <span class="arrow" id="logArrow">▶</span> 📊 答题记录与统计
    </div>
    <div id="logSection">
      <div class="log-stats" id="logStats"></div>
      <div class="log-tools">
        <button class="btn btn-outline" id="btnExportLog">📥 导出做题记录</button>
        <button class="btn btn-outline" id="btnImportLog">📂 导入做题记录</button>
        <button class="btn btn-outline" id="btnClearLog">🗑 清空全部</button>
      </div>
      <div class="log-table-wrap">
        <table class="log-table">
          <thead><tr><th>时间</th><th>题号</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>

如何持续优化产品性能，提升用户体验的挑战。数据分析在智能音箱的持续优化中扮演着核心角色。通过对用户行为的深入挖掘，企业可以了解用户偏好、使用模式和潜在的痛点。例如，分析用户何时最常使用智能音箱、他们最喜欢的功能是什么、以及哪些功能的响应时间过长等问题，可以帮助企业做出有针对性的改进决策。<br>\n（1）你作为人工智能训练师，根据给定的数据集（智能音箱数据集.xlsx），从以下三方面：<br>\n用户使用习惯：分析哪些功能最常被使用；<br>\n功能使用频率：识别最受欢迎的功能和较少使用的功能；<br>\n响应时间：考察不同功能的平均响应时间，找出可能的瓶颈。<br>\n给出一份在用户使用习惯、功能使用频率和响应时间方面的分析报告，将其保存为docx文件，命名为3.1.1-1.docx。<br>\n（2）为了进一步提升用户体验，给出智能音箱产品的3个优化方向和对应解决方案，将其保存为docx文件，命名为3.1.1-2.docx。</p>\n\n<p>所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为“准考证号+身份证号后六位”。</p>\n\n<p>&nbsp;</p>\n\n<p><strong>3.</strong>技能要求</p>\n\n<p>（1）能对单一智能产品使用的数据进行全面分析，输出分析报告；<br>\n（2）能对单一智能产品提出优化需求；<br>\n（3）能为单一智能产品的应用设计智能解决方案。</p>\n\n<p>&nbsp;</p>\n\n<p><strong>4.</strong>质量指标</p>\n\n<p>（1）分析报告全面可靠；<br>\n（2）优化方向合理，具有良好应用价值；<br>\n（3）解决方案切实可行。</p>\n","q":[{"n":1,"t":"人工智能训练师3.1.1文档1","y":"填空题","b":{"p":"请勿修改答题卷，在指定单元格内填写答案\n\n \n\n1.分析报告（选择素材中的功能调用类型填写）\n\n用户使用习惯\n\n最常被使用的功能：{{1}}      {{2}}      {{3}}\n\n功能使用频率\n\n最受欢迎的功能{{4}}\n\n较少使用的功能{{5}}      {{6}}\n\n响应时间分析\n\n响应时间较长的功能{{7}}\n\n响应时间适中的功能{{8}}      {{9}}      {{10}}\n\n响应时间较短的功能{{11}}\n\n2.优化方向及解决方案\n\n \n\n优化方向1： {{12}}\n\n对应解决方案1：{{13}}\n\n优化方向2：{{14}}\n\n对应解决方案2：{{15}}\n\n优化方向3：{{16}}\n\n对应解决方案3：{{17}}","a":[{"i":"1","a":"调整音量"},{"i":"2","a":"查询新闻"},{"i":"3","a":"查天气"},{"i":"4","a":"调整音量"},{"i":"5","a":"播放音乐"},{"i":"6","a":"控制家居"},{"i":"7","a":"控制家居"},{"i":"8","a":"提醒事项"},{"i":"9","a":"调整音量"},{"i":"10","a":"查询知识"},{"i":"11","a":"查询新闻"},{"i":"12","a":"网络连接与设备交互优化"},{"i":"13","a":"强化网络连接稳定性，采用更高效的通信协议，减少控制家居功能的响应时间"},{"i":"14","a":"提升信息检索效率"},{"i":"15","a":"优化查询知识的检索算法，加快数据处理速度，提升用户体验"},{"i":"16","a":"增强本地处理能力"},{"i":"17","a":"增加本地缓存和预加载机制，尤其在播放音乐和查天气上，以减少对外部资源的依赖"}]}}]},{"i":"3.1.2","s":"人工智能训练师三级3.1.2","d":"高级","m":{"难度":"高级","子题数量":"1","总分":"15","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"layout-grid-mode:char\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:16.0000pt\"><span style=\"font-family:宋体 物反馈机制，能够实时监测用户的健康状态，包括但不限于血压、血糖水平、身体成分分析等。这些系统通常与云端服务相连，提供个性化的健康建议和预警。为了在市场中保持竞争力，制造商需要利用数据分析来不断优化产品性能和用户交互体验。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>1）你作为人工智能训练师，根据给定的数据集（智能健康监测系统数据集.xlsx），从以下三方面：</span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">用户活动周期：分析用户一天中不同时间段的健康指标变化趋势，确定高风险时段和安全时段。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">健康指标偏好度：识别哪些健康监测功能（如血压监测、血糖检测、体脂分析）受用户青睐，哪些功能使用较少。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">系统响应与准确性：评估系统在监测各项健康指标时的响应时间，找出可能导致误报或延迟的关键因素。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">给出一份在用户活动周期、健康指标偏好度和系统响应</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">时间</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">方面的分析报告，将其保存为</font>docx文件，命名为3.1.4-1.docx。</span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>2）为了进一步提高产品的</span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">功能</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">性和用户友好性，给出智能健康监测系统的</font>3个优化方向和对应解决方案，将其保存为docx文件，命名为3.1.4-2.docx。</span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">“</font></span></span><span style=\"font-size:10.5000pt\"><span sty  face=\"宋体\">（</font>2）优化方向合理，具有良好应用价值； </span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>3）解决方案切实可行。</span></span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级3.1.4文档1","y":"填空题","b":{"p":"请勿修改答题卷，在指定单元格内填写答案\n\n1.分析报告\n用户活动周期\n\n健康指标变化趋势：\n\n  {{1}}\n\n高风险时间段：\n\n {{2}}\n\n安全时间段:\n\n {{3}}\n\n健康指标偏好度\n\n受用户青睐的功能{{4}}      {{5}}\n\n较少使用的功能{{6}} \n\n注：\n\n收缩压值、舒张压值属于血压监测功能。\n\n血糖值属于血糖检测功能。\n\n体脂值属于体脂分析功能。\n\n \n\n系统响应与准确性\n\n响应时间较长的功能{{7}}\n\n响应时间适中的功能{{8}}\n\n响应时间较短的功能{{9}}\n\n注：\n\n收缩压值、舒张压值属于血压监测功能。\n\n血糖值属于血糖检测功能。\n\n体脂值属于体脂分析功能。\n\n \n\n2.优化方向及解决方案\n\n优化方向1： {{10}}\n\n对应解决方案1：{{11}}\n\n优化方向2：{{12}}\n\n对应解决方案2：{{13}}\n\n优化方向3：{{14}}\n\n对应解决方案3：{{15}}","a":[{"i":"1","a":"<ol>\n  <li><strong>血压：</strong>在一天的不同时间段，收缩压和舒张压存在一定波动。平均情况下，收缩压在早晨7:30出现较高值，午后（12:00至14:00）趋于稳定，而在晚上（18:00）有所下降。舒张压则呈现出大致相反的趋势，12:00左右较低，而在早晚6:00较高。但整体波动趋势相较于收缩压更为平稳，基本低于85。</li>\n  <li><strong>血糖：</strong>血糖在早晨8:00点，中午13:00点和晚上19:00点左右较高，超出6.5（正常中最高值6.1）。其余时间正常。</li>\n  <li><strong>体脂：</strong>体脂数据相对稳定，维持在0.17。</li>\n</ol>"},{"i":"2","a":"<ol>\n  <li><strong>血压：</strong>早晨起床后的时间（6:00-8:00），收缩压普遍较高，可能是由于生理恢复和活动开始的影响。此时为高风险时段，需特别注意高血压人群。</li>\n  <li><strong>血糖：</strong>早餐午餐晚餐后的血糖波动较大，需要注意控制餐后血糖，特别是对于糖尿病患者。</li>\n</ol>"},{"i":"3","a":"<ol>\n  <li><strong>血压：</strong>正常的血压范围在下午12:00后趋于稳定数值内，是安全时段。</li>\n  <li><strong>血糖：</strong>除餐后时段，其余时段通常较为安全，但餐后需要关注血糖波动。</li>\n  <li><strong>体脂：</strong>体脂通常处于稳定范围，在全天内可以视为安全时段，特别是在合理饮食和运动后。</li>\n</ol>"},{"i":"4","a":"受用户青睐的功能"},{"i":"5","a":"血压"},{"i":"6","a":"血糖"},{"i":"7","a":"体脂"},{"i":"8","a":"体脂（0.66125）"},{"i":"9","a":"血压（0.61925）"},{"i":"10","a":"血糖（0.59925）"},{"i":"11","a":"增加个性化健康建议功能"},{"i":"12","a":"根据用户健康状态（如高血压、糖尿病等），结合实时数据，为用户提供个性化的健康建议。通过机器学习算法分析用户的健康历史，自动生成并推送个性化的健身、饮食等建议，提升产品的用户友好性和准确性。"},{"i":"13","a":"提高数据监测准确性"},{"i":"14","a":"增强传感器精度，确保血糖、体脂等测量值的准确性，并定期进行设备校准。对高风险时段的数据采集和分析进行优化，增加数据冗余和校验机制，以减少误报或延迟"},{"i":"15","a":"增强数据可视化和反馈机制"}]}}]},{"i":"3.1.5","s":"人工智能训练师三级3.1.5","d":"高级","m":{"难度":"高级","子题数量":"1","总分":"15","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"layout-grid-mode:char\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:16.0000pt\"><span style=\"font-family:宋体\"><span style=\"line-height:150%\"><span style=\"letter-spacing:2.0000pt\"><font face=\"宋体\">人工智能训练师</font></span></span></span></span></b><b><span style=\"font-size:16.0000pt\"><span style=\"font-family:宋体\"><span style=\"line-height:150%\"><span style=\"letter-spacing:2.0000pt\"><font face=\"宋体\">（</font></span></span></span></span></b><b><span style=\"font-size:16.0000pt\"><span style=\"font-family:宋体\"><span style=\"line-height:150%\"><span style=\"letter-spacing:2.0000pt\"><font face=\"宋体\">三级</font></span></span></span></span></b><b><span style=\"font-size:16.0000pt\"><span style=\"font-family:宋体\"><span style=\"line-height:150%\"><span style=\"letter-spacing:2.0000pt\"><font face=\"宋体\">）操作技能考核</font></span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">准考证号：</font></span></span>&nbsp;&nbsp;</span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">试题代码：</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">试题名称：</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"黑体\">智能家居环境控制系统的数据分析与优化</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">考核时间：</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\">20min</span></span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">1.</font></span></span></b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">场地设备要求</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"黑体\">（</font>1<font face=\"黑体\">）人工智能训练师主机 </font><font face=\"Times New Roman, Times, serif\">1 </font><font face=\"黑体\">台； </font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"黑体\">（</font>2<font face=\"黑体\">）</font><font face=\"Times New Roman, Times, serif\">Python </font><font face=\"黑体\">编译环境； </font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"黑体\">（</font>3<font face=\"黑体\">）智能家居环境控制系统数据集。</font></span></span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">2.</font></span></span></b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">工作任务</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">智能家居环境控制系统通过集成温度、湿度、光照等多个传感器，实现对家庭环境的智能化管理。系统可以根据用户习惯自动调整室内环境，提高居住舒适度和能源效率。为了优化这一系统，需要对收集到的大量环境数据进行深入分析，以了解用户对不同环境参数的偏好，识别系统的潜在故障点，并优化系统的响应速度和能耗。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>1）你作为人工智能训练师，根据给定的数据集（智能家居环境控制系统数据集.xlsx），从以下三方面：</span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">用户环境偏好：分析用户在一天中不同时段对温度、湿度和光照强度的偏好设置。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">系统响应时间：评估用户操作（如调节温度</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">等</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">）到系统反馈的平均延迟，找出影响响应速度的因素。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">能源消耗分析：识别系统的平均能耗，寻找节能潜力。</font></span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">给出一份在用户环境偏好、系统响应时间和能源消耗分析方面的分析报告，将其保存为</font>docx文件，命名为3.1.5-1.docx。</span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>2）为了进一步增强产品功能和用户体验，给出智能家居环境控制系统的3个优化方向和对应解决方案，将其保存为docx文件，命名为3.1.5-2.docx。</span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"宋体\">所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">“</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"宋体\">准考证号</font>+<font face=\"宋体\">身份证号后六位</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">”</font></span></span><span style=\"font-size:10.5000pt\"><span style=\"font-family:'Times New Roman'\"><font face=\"宋体\">。</font></span></span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">3.</font></span></span></b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">技能要求</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>1）能对单一智能产品使用的数据进行全面分析，输出分析报告； </span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>2）能对单一智能产品提出优化需求； </span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>3）能为单一智能产品的应用设计智能解决方案。</span></span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">4.</font></span></span></b><span style=\"font-size:10.5000pt\"><span style=\"font-family:黑体\"><font face=\"黑体\">质量指标</font></span></span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;\"><span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</font>1）分析报告全面可靠； </span></span><br>\n<span style=\"font-size:10.5000pt\"><span style=\"font-family:宋体\"><font face=\"宋体\">（</fon AR)\n\n      w, h = image.size\n\n      left = (w - crop_size) / 2\n\n      top = (h - crop_size) / 2\n\n      image = image.crop((left, top, left + crop_size, top + crop_size))\n\n      image = np.array(image).astype(np.float32)\n\n      image = image / 255.0\n\n      image = (image - mean) / std\n\n      image = np.transpose(image, (2, 0, 1))\n\n      image = image.reshape((1,) + image.shape)\n\n      return image\n\n# 加载模型 2分\n\nsession = {{1}}# 加载类别标签 2分\n\nwith {{2}}as f:\n\n      labels = [line.strip() for line in f.readlines()]\n\n# 获取模型输入和输出的名称\n\ninput_name = session.get_inputs()[0].name\n\noutput_name = session.get_outputs()[0].name\n\n# 加载图片 2分\n\nimage = {{3}}('RGB')\n\n# 预处理图片 2分\n\nprocessed_image = {{4}}# 确保输入数据是 float32 类型\n\nprocessed_image = processed_image.astype(np.float32)\n\n# 进行图片识别 2分\n\noutput = {{5}}([output_name], {input_name: processed_image})[0]\n\n# 应用 softmax 函数获取识别分类后的准确率 2分\n\naccuracy = {{6}}(output, axis=-1)\n\n# 获取预测的类别索引\n\npredicted_idx = {{7}}# 获取预测的准确值（转换为百分比）\n\nprob_percentage = {{8}}# 获取预测的类别标签\n\npredicted_label = {{9}}# 输出预测结果，包含百分比形式的概率\n\nprint(f\"Predicted class: {predicted_label}, Accuracy: {prob_percentage:.2f}%\")","a":[{"i":"1","a":"ort.InferenceSession('flower-detection.onnx')"},{"i":"2","a":"open('labels.txt','r')"},{"i":"3","a":"Image.open('flower_test.png').convert"},{"i":"4","a":"preprocess_image(image)"},{"i":"5","a":"session.run"},{"i":"6","a":"scipy.special.softmax"},{"i":"7","a":"np.argmax(accuracy)"},{"i":"8","a":"accuracy[0][predicted_idx]*100"},{"i":"9","a":"labels[predicted_idx]"}]}},{"n":2,"t":"花朵智能识别系统交互流程设计文档题1","y":"填空题","b":{"p":"文档题：\n\n \n\n请勿修改答题卷，在指定单元格内填写答案\n\n \n\n人机交互的最优方式(流程不少于3条，正确得1分)\n\n  {{1}}","a":[{"i":"1","a":"<ol>\n  <li><strong>用户界面设计：</strong>提供一个简洁直观的用户界面，方便用户上传图片和查看识别结果。</li>\n  <li><strong>模型加载：</strong>系统启动时预加载模型和标签，减少用户等待时间。</li>\n  <li><strong>图像上传与预处理：</strong>允许用户上传图片，并自动进行必要的预处理。</li>\n  <li><strong>图像识别：</strong>后台使用“resnet.onnx”模型处理预处理后的图片。</li>\n  <li><strong>结果展示：</strong>清晰展示识别结果，包括最可能的类别和概率。</li>\n  <li><strong>交互反馈：</strong>提供用户反馈选项，以改进模型性能。</li>\n  <li><strong>帮助与支持：</strong>内置帮助文档和客服支持，提升用户体验。</li>\n  <li><strong>性能优化：</strong>优化系统响应速度和模型处理能力。</li>\n  <li><strong>安全性考虑：</strong>确保用户数据安全和隐私保护。</li>\n  <li><strong>多语言支持：</strong>界面支持多语言，满足全球用户需求。</li>\n  <li><strong>可访问性：</strong>确保UI无障碍，方便所有用户操作。</li>\n</ol>"}]}}]},{"i":"3.2.5","s":"人工智能训练师三级3.2.5","d":"高级","m":{"难度":"高级","子题数量":"2","总分":"18","预计时长":"10 分钟"},"r":"<p>人工智能训练师（三级）操作技能考核</p><p></p><p>准考证号：</p><p></p><p>试题代码：</p><p></p><p>试题名称：人脸AI智能检测系统交互流程设计</p><p></p><p>考核时间：20min</p><p></p><p>1.场地设备要求</p><p></p><p>（1）人工智能训练师主机 1 台；</p><p></p><p>2.工作任务</p><p></p><p>在安防监控、智能交通等领域，实时准确的人脸检测需求日益增长。传统的人脸检测方法在面对复杂光照、多角度、遮挡等情况时，检测效果往往不尽人意。随着深度学习技术的发展，基于深度神经网络的人脸检测模型展现出强大的性能优势。ONNX（Open Neural Network Exchange）作为一种开放式的神经网络交换格式，能够实现不同深度学习框架间的模型转换与共享，使得基于 ONNX 的人脸检测模型可以在多种环境下高效运行。本系统所使用的 “version-RFB-320.onnx” 模型，通过大量数据训练，能够快速准确地检测出图像中的人脸，在实际应用场景中具有重要价值。</p><p></p><p>AI 模型说明：“version-RFB-320.onnx” 模型是用于人脸检测的 ONNX 格式模型，对应的类别标签文件为 “voc-model-labels.txt” 。该模型的使用交互流程为：</p><p></p><p>（1）加载 “version-RFB-320.onnx” 模型和 “voc-model-labels.txt” 类别标签；</p><p></p><p>（2）加载本地测试图片文件夹 “imgs” 中的所有图片，并对每张图片进行预处理以符合模型输入要求；</p><p></p><p>（3）使用 “version-RFB-320.onnx” 模型对加载的图片进行人脸检测；</p><p></p><p>（4）在图片上绘制检测到的人脸框，并将处理后的图片保存到 “./detect_imgs_results_onnx” 文件夹中；</p><p></p><p>（5）统计所有图片中检测到的人脸总数并输出。</p><p></p><p>你作为一名人工智能训练师，请完成以下工作任务：</p><p></p><p>（1）补全该模型的使用交互流程对应的 Python 代码（3.2.5.ipynb），实现本地测试图片文件夹 “imgs” 中所有图片的人脸检测，将运行结果截图保存到3.2.5-1.jpg中，并将检测结果的图片上传。</p><p></p><p>（2）在上面的使用交互流程基础上，结合实际应用场景，设计在人脸检测系统中使用 “version-RFB-320.onnx” 模型的一种人机交互优化方案，包括交互界面布局、操作流程等内容，将其保存为docx文件，命名为 3.2.5.docx。</p><p></p><p>所有结果文件储存在桌面新建的考生文件夹中，文件夹命名为 “准考证号 + 身份证号后六位”。</p><p></p><p>3.技能要求</p><p></p><p>（1）能确保模型在单一场景下稳定运行；</p><p></p><p>（2）能通过分析，找到单一场景下人工和智能交互的最优方式。</p><p></p><p>（3）能对单一场景下人工和智能交互界面设计提出优化需求。</p><p></p><p>4.质量指标</p><p></p><p>（1）模型运行稳定，使用正常；</p><p></p><p>（2）单一场景下人工和智能交互的最优方式切实可行。</p>","q":[{"n":1,"t":"人脸AI智能检测系统交互流程设计代码块1","y":"填空题","b":{"p":"import os\n\nimport time\n\nimport cv2\n\nimport numpy as np\n\nimport vision.utils.box_utils_numpy as box_utils\n\nimport onnxruntime as ort\n\n# 定义预测函数，对模型输出的边界框和置信度进行后处理\n\ndef predict(width, height, confidences, boxes, prob_threshold, iou_threshold=0.3, top_k=-1):\n\n      boxes = boxes[0]\n\n      confidences = confidences[0]\n\n      picked_box_probs = []\n\n      picked_labels = []\n\n      for class_index in range(1, confidences.shape[1]):\n\n            probs = confidences[:, class_index]\n\n            mask = probs > prob_threshold\n\n            probs = probs[mask]\n\n            if probs.shape[0] == 0:\n\n                  continue\n\n            subset_boxes = boxes[mask, :]\n\n            box_probs = np.concatenate([subset_boxes, probs.reshape(-1, 1)], axis=1)\n\n            box_probs = box_utils.hard_nms(box_probs,iou_threshold=iou_threshold,top_k=top_k,)\n\n            picked_box_probs.append(box_probs)\n\n            picked_labels.extend([class_index] * box_probs.shape[0])\n\n      if not picked_box_probs:\n\n            return np.array([]), np.array([]), np.array([])\n\n      picked_box_probs = np.concatenate(picked_box_probs)\n\n      picked_box_probs[:, 0] *= width\n\n      picked_box_probs[:, 1] *= height\n\n      picked_box_probs[:, 2] *= width\n\n      picked_box_probs[:, 3] *= height\n\n      return picked_box_probs[:, :4].astype(np.int32), np.array(picked_labels), picked_box_probs[:, 4]\n\n# 从标签文件中读取每一行，并去除行首尾的空白字符，得到类别名称列表 2分\n\nclass_names = [ {{1}}for name in open('voc-model-labels.txt').readlines()]\n\n# 创建 ONNX Runtime 的推理会话，用于运行模型进行推理 2分\n\nort_session = {{2}}('version-RFB-320.onnx')\n\n# 获取模型输入的名称 2分\n\ninput_name = {{3}}()[0].name\n\n# 定义保存检测结果图像的目录路径\n\nresult_path = \"./detect_imgs_results_onnx\"\n\n# 定义置信度阈值，用于筛选出置信度较高的检测结果\n\nthreshold = 0.7\n\n# 定义存储待检测图像的目录路径\n\npath = \"imgs\"\n\n# 用于统计所有图像中检测到的目标框总数，初始化为 0\n\nsum = 0\n\n# 如果保存结果的目录不存在，则创建该目录 2分\n\nif not os.path.exists(result_path):\n\n      os. {{4}}\n\n# 获取指定目录下的所有文件和文件夹名称列表\n\nlistdir = os.listdir(path)\n\n# 遍历目录下的每个文件\n\nfor file_path in listdir:\n\n      # 拼接图像文件的完整路径\n\n      img_path = os.path.join(path, file_path)\n\n      # 使用 OpenCV 读取图像文件 2分\n\n      orig_image = {{5}}     \n\n      # 将图像从 BGR 颜色空间转换为 RGB 颜色空间（许多模型要求输入为 RGB 格式）\n\n      image = cv2.cvtColor(orig_image, cv2.COLOR_BGR2RGB)\n\n      # 将图像调整为 320x240 的尺寸（符合模型输入的尺寸要求） 2分\n\n      image = {{6}}( {{7}}, (320, 240))\n\n      # 定义图像归一化的均值数组 2分\n\n      image_mean = {{8}}([127, 127, 127])\n\n      # 对图像进行归一化处理，减去均值并除以 128\n\n      image = (image - image_mean) / 128\n\n      # 将图像的维度从 (高度, 宽度, 通道数) 转换为 (通道数, 高度, 宽度)\n\n      image = np.transpose(image, [2, 0, 1])\n\n      # 在第一个维度上扩展一个维度，将图像变为 (1, 通道数, 高度, 宽度)，以符合模型输入的维度要求  1分\n\n      image = {{9}}(image, axis=0)\n\n      # 将图像数据类型转换为 float32 类型\n\n      image = image.astype(np.float32)\n\n      # 记录开始时间，用于计算模型推理的耗时\n\n      time_time = time.time()\n\n      # 使用 ONNX Runtime 运行模型，输入图像数据，得到模型输出的置信度和边界框  2分\n\n      confidences, boxes = {{10}}(None, {input_name: image})\n\n      # 计算并打印模型推理的耗时\n\n      print(\"cost time:{}\".format(time.time() - time_time))\n\n      # 调用 predict 函数对模型输出的边界框和置信度进行后处理，得到最终的边界框、类别标签和置信度\n\n      boxes, labels, probs = predict(orig_image.shape[1], orig_image.shape[0], confidences, boxes, threshold)\n\n      # 遍历每个检测到的目标框\n\n      for i in range(boxes.shape[0]):\n\n            # 获取当前目标框的坐标\n\n            box = boxes[i, :]\n\n            # 生成当前目标框的标签字符串，包含类别名称和置信度\n\n            label = f\"{class_names[labels[i]]}: {probs[i]:.2f}\"\n\n            # 在原始图像上绘制目标框，颜色为 (255, 255, 0)，线条粗细为 4\n\n            cv2.rectangle(orig_image, (box[0], box[1]), (box[2], box[3]), (255, 255, 0), 4)\n\n            # 将绘制了目标框的图像保存到结果目录中\n\n            cv2.imwrite(os.path.join(result_path, file_path), orig_image)\n\n      # 累加当前图像中检测到的目标框数量到总数中\n\n      sum += boxes.shape[0]\n\n# 打印所有图像中检测到的目标框总数\n\nprint(\"sum:{}\".format(sum))","a":[{"i":"1","a":"name.strip()"},{"i":"2","a":"ort.InferenceSession"},{"i":"3","a":"ort_session.get_inputs"},{"i":"4","a":"makedirs(result_path)"},{"i":"5","a":"cv2.imread(img_path)"},{"i":"6","a":"cv2.resize"},{"i":"7","a":"image"},{"i":"8","a":"np.array"},{"i":"9","a":"np.expand_dims"},{"i":"10","a":"ort_session.run"}]}},{"n":2,"t":"人工智能训练师三级3.2.5文档题1","y":"填空题","b":{"p":"文档题：\n\n \n\n请勿修改答题卷，在指定单元格内填写答案\n\n \n\n人机交互的最优方式(流程不少于3条，正确得1分)\n\n  {{1}}","a":[{"i":"1","a":"<ol>\n  <li><strong>用户界面设计：</strong>提供一个简洁直观的用户界面，包含视频预览区、检测结果展示区和功能操作区，方便用户进行人脸检测操作。</li>\n  <li><strong>模型加载：</strong>系统启动时预加载\"version-RFB-320.onnx\"模型和类别标签文件，减少用户等待时间，提升系统响应速度。</li>\n  <li><strong>图像上传与预处理：</strong>支持单张图片上传和批量图片处理，自动进行图像尺寸调整、颜色空间转换和归一化等预处理操作。</li>\n  <li><strong>图像识别：</strong>后台使用\"version-RFB-320.onnx\"模型进行人脸检测，支持实时视频检测和图片检测两种模式。</li>\n  <li><strong>结果展示：</strong>清晰展示检测结果，包括人脸位置框、检测置信度和检测时间等信息，支持结果保存和导出。</li>\n  <li><strong>交互反馈：</strong>提供检测结果评分和问题反馈功能，收集用户意见以改进模型性能。</li>\n  <li><strong>帮助与支持：</strong>内置操作指南和常见问题解答，提供在线客服支持，帮助用户解决使用问题。</li>\n  <li><strong>性能优化：</strong>采用多线程处理、GPU加速等技术，优化系统响应速度和模型处理能力。</li>\n  <li><strong>安全性考虑：</strong>实现用户数据加密存储、访问权限控制和操作日志记录，确保系统安全。</li>\n  <li><strong>多语言支持：</strong>界面支持中英文切换，满足不同用户的语言需求。</li>\n  <li><strong>可访问性：</strong>提供高对比度模式、字体大小调整和快捷键支持，确保所有用户都能方便操作。</li>\n</ol>"}]}}]},{"i":"4.1.1","s":"人工智能训练师三级4.1.1","d":"初级","m":{"难度":"初级","子题数量":"1","总分":"5","预计时长":"15 分钟"},"r":"<div style=\"text-align: center;\"><span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"layout-grid-mode:char\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span style=\"font-size:16.0pt\"><span style=\"line-height:150%\"><span style=\"font-family:宋体\"><span style=\"letter-spacing:2.0pt\">人工智能训练师（三级）操作技能考核</span></span></span></span></b></span></span></span></span></div>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:黑体\">准考证号：</span>&nbsp;</span></span></span><br>\n<span style=\"font- an style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">3.</span></b><span style=\"font-family:黑体\">技能要求</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）能编写初级培训讲义；<br>\n（2）能对初级工、中级工开展知识和技术培训；</span></span></span></span><br>\n<br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><b><span lang=\"EN-US\" style=\"font-family:黑体\">4.</span></b><span style=\"font-family:黑体\">质量指标</span></span></span></span><br>\n<span style=\"font-size:10.5pt\"><span style=\"line-height:150%\"><span style=\"font-family:&quot;Times New Roman&quot;,serif\"><span style=\"font-family:宋体\">（1）培训讲义编写逻辑合理；<br>\n（2）培训资料正确有效；<br>\n（3）语句组织通顺。</span></span></span></span><br>\n&nbsp;","q":[{"n":1,"t":"人工智能训练师三级4.1.1文档题1","y":"填空题","b":{"p":"在下划线上填写答案。\n\n根据学习大纲补充学习目标\n\n引言\n\n学习目标：了解数据标注的重要性和应用场景。\n\n内容：\n\n介绍人工智能在康复训练中的应用，数据标注在个性化康复训练计划中的作用。\n\n \n\n数据标注基础理论\n\n学习目标： {{1}} \n\n内容：\n\n什么是数据标注？\n\n数据标注的类型：文本、图像、视频、音频。\n\n数据标注在人工智能中的作用和重要性。\n\n \n\nLabel Studio简介与安装\n\n学习目标： {{2}}\n\n内容：\n\nLabel Studio简介及应用场景。\n\n安装与配置Label Studio。\n\nLabel Studio界面介绍和基本操作。\n\n \n\n文本数据标注\n\n学习目标： {{3}}\n\n内容：\n\n文本标注类型：命名实体识别、情感分析等。\n\nLabel Studio文本标注功能演示。\n\n实践操作：标注一个文本数据集。\n\n \n\n图像数据标注\n\n学习目标： {{4}}\n\n内容：\n\n图像标注类型：图像分类、目标检测、图像分割等。\n\nLabel Studio图像标注功能演示。\n\n实践操作：标注一个图像数据集。\n\n \n\n视频数据标注\n\n学习目标： {{5}}\n\n内容：\n\n视频标注类型：动作识别、事件检测等。\n\nLabel Studio视频标注功能演示。\n\n实践操作：标注一个视频数据集。\n\n \n\n音频数据标注\n\n学习目标：掌握音频数据标注的方法和技巧。\n\n内容：\n\n音频标注类型：语音识别、情感分析等。\n\nLabel Studio音频标注功能演示。\n\n实践操作：标注一个音频数据集。\n\n \n\n综合项目实践\n\n学习目标：综合运用所学知识进行数据标注项目。\n\n内容：\n\n项目介绍：为康复训练项目进行多模态数据标注（包括文本、图像、视频、音频）。\n\n数据标注：学员分组进行实际数据标注任务。\n\n项目评审：展示标注成果，讲解标注思路和遇到的问题。\n\n \n\n总结与答疑\n\n学习目标：巩固所学内容，解决学员疑问。\n\n内容：培训内容
