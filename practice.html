<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理论题库 · 答题练习</title>
<style>:root {
  --primary: #4f6ef7;
  --primary-light: #eef1ff;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-light);
}
.header-stats span { white-space: nowrap; }
.header-stats strong { color: var(--text); }

/* Main layout */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-light);
  transition: all .2s;
}
.tab-btn:hover { color: var(--text); background: var(--bg); }
.tab-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,110,247,.3);
}

/* Question navigator */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.nav-bar label {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 500;
}
.nav-bar input[type="number"] {
  width: 80px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
  outline: none;
}
.nav-bar input[type="number"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,110,247,.15);
}
.nav-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: all .15s;
}
.nav-btn:hover {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
}
.nav-btn:disabled { opacity: .4; cursor: default; }
.nav-info {
  font-size: 13px;
  color: var(--text-light);
  margin-left: auto;
}

/* Question card */
.q-card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 28px 24px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.q-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.q-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--primary-light);
  color: var(--primary);
}
.q-tag.diff-easy { background: #dcfce7; color: #16a34a; }
.q-tag.diff-mid  { background: #fef3c7; color: #d97706; }
.q-tag.diff-hard { background: #fee2e2; color: #dc2626; }
.q-summary {
  font-size: 13px;
  color: var(--text-light);
}
.q-text {
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 20px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.opt-item:hover { border-color: var(--primary); background: var(--primary-light); }
.opt-item input { margin-top: 3px; accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
.opt-item .opt-label {
  font-weight: 600;
  color: var(--primary);
  margin-right: 4px;
}
.opt-item .opt-text { line-height: 1.5; }

/* States for opt-item */
.opt-item.correct {
  border-color: var(--success);
  background: #f0fdf4;
}
.opt-item.correct .opt-label { color: var(--success); }
.opt-item.wrong {
  border-color: var(--danger);
  background: #fef2f2;
}
.opt-item.wrong .opt-label { color: var(--danger); }
.opt-item.missed {
  border-color: var(--warning);
  background: #fffbeb;
}
.opt-item.missed .opt-label { color: var(--warning); }
.opt-item.selected { border-color: var(--primary); background: var(--primary-light); }
.opt-item.disabled { pointer-events: none; }

/* Action bar */
.action-bar {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #3b5de7; box-shadow: 0 4px 12px rgba(79,110,247,.3); }
.btn-primary:disabled { opacity: .5; cursor: default; box-shadow: none; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.feedback.wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
.feedback .fb-ans { font-weight: 600; }

/* Log section */
.section-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}
.section-toggle:hover { color: var(--primary); }
.section-toggle .arrow { transition: transform .2s; }
.section-toggle .arrow.open { transform: rotate(90deg); }

#logSection { display: none; }
#logSection.open { display: block; }

.log-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.stat-card .num {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
}
.stat-card .num.green { color: var(--success); }
.stat-card .num.red { color: var(--danger); }
.stat-card .label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

.log-table-wrap {
  max-height: 400px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.log-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.log-table th {
  background: var(--bg);
  position: sticky;
  top: 0;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  z-index: 1;
}
.log-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.log-table tr:hover td { background: var(--bg); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
}
.badge-ok { background: #dcfce7; color: #16a34a; }
.badge-fail { background: #fee2e2; color: #dc2626; }

.log-tools {
  display: flex;
  gap: 8px;
  margin: 12px 0;
  flex-wrap: wrap;
}

/* Loading */
#loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
#loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 17px; }
  .q-card { padding: 20px 16px; }
  .q-text { font-size: 15px; }
  .action-bar .btn { flex: 1; text-align: center; }
  .nav-bar input[type="number"] { width: 64px; }
}
</style>
</head>

<div class="header">
  <h1>📝 理论题库 · 答题练习</h1>
  <div class="header-stats">
    <span id="hintTotal">加载中…</span>
    <span id="hintLogCount">日志: 0 条</span>
  </div>
</div>
<div class="container">

    <div class="spinner"></div>
    <div>正在加载题库…</div>
  </div>

    <div class="q-card">

      <div class="options" id="optionsContainer"></div>
      <div class="action-bar">

        <button class="btn btn-outline" id="btnNextQ">➡ 下一题</button>

      <div class="feedback" id="feedback"></div>
    </div>
    <div class="section-toggle" id="logToggle">
      <span class="arrow" id="logArrow">▶</span> 📊 答题记录与统计
    </div>
    <div id="logSection">
      <div class="log-stats" id="logStats"></div>
      <div class="log-tools">
        <button class="btn btn-outline" id="btnExportLog">📥 导出日志</button>
        <button class="btn btn-outline" id="btnClearLog">🗑 清空日志</button>
      </div>
      <div class="log-table-wrap">
        <table class="log-table">
          <thead><tr><th>时间</th><th>题号</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

// app.js — 适配压缩数据格式 (i,s,d,q,o,l,t,c)
const DATA = { single: [], multi: [], judge: [] };
let currentType = 'single';
let currentNum = 1;
let answered = false;
let answerRevealed = false;
let logs = [];
const LOG_KEY = 'practice_logs';

function getData() { return DATA[currentType]; }
function getQuestion() {
  const arr = getData();
  const pfx = { single:'single', multi:'multi', judge:'judge' }[currentType];
  return arr.find(q => parseInt(q.i.replace(pfx, '')) === currentNum);
}

function typeLabel(t) {
  return { single:'单选题', multi:'多选题', judge:'判断题' }[t];
}

function diffClass(d) {
  return d === '初级' ? 'easy' : d === '中级' ? 'mid' : 'hard';
}

function render() {
  const q = getQuestion();
  if (!q) {
    document.getElementById('qText').textContent = `⚠ 未找到 ${currentType}${currentNum}`;
    document.getElementById('optionsContainer').innerHTML = '';
    return;
  }

  document.getElementById('qTag').textContent = typeLabel(currentType);
  const diffEl = document.getElementById('qDiff');
  diffEl.textContent = q.d || '中级';
  diffEl.className = 'q-tag diff-' + diffClass(q.d);
  document.getElementById('qSummary').textContent = q.s || '';
  document.getElementById('qText').textContent = q.q || '';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  answered = false;
  answerRevealed = false;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnShowAns').textContent = '👁 显示答案';

  const inputType = currentType === 'multi' ? 'checkbox' : 'radio';

  q.o.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'opt-item';
    div.dataset.label = opt.l;

    const input = document.createElement('input');
    input.type = inputType;
    input.name = `opt_${currentType}_${currentNum}`;
    input.value = opt.l;
    input.id = `opt_${currentType}_${currentNum}_${opt.l}`;

    const labelSpan = document.createElement('span');
    labelSpan.className = 'opt-label';
    labelSpan.textContent = opt.l + '.';

    const textSpan = document.createElement('span');
    textSpan.className = 'opt-text';
    textSpan.textContent = opt.t;

    div.appendChild(input);
    div.appendChild(labelSpan);
    div.appendChild(textSpan);
    div.addEventListener('click', e => {
      if (div.classList.contains('disabled')) return;
      const inp = div.querySelector('input');
      if (inputType === 'radio') {
        container.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        container.querySelectorAll('.opt-item').forEach(o => o.classList.remove('selected'));
      }
      inp.checked = !inp.checked;
      div.classList.toggle('selected', inp.checked);
    });
    container.appendChild(div);
  });

  updateNavInfo();
}

function updateNavInfo() {
  const total = getData().length;
  document.getElementById('navInfo').textContent = `${currentNum} / ${total}`;
  document.getElementById('qNum').max = total;
  document.getElementById('qNum').value = currentNum;
  document.getElementById('btnPrev').disabled = currentNum <= 1;
  document.getElementById('btnNext').disabled = currentNum >= total;
}

// ====== 提交判对错 ======
document.getElementById('btnSubmit').addEventListener('click', function () {
  if (answered) return;
  const q = getQuestion();
  if (!q) return;

  const container = document.getElementById('optionsContainer');
  const selected = [];
  container.querySelectorAll('input:checked').forEach(inp => selected.push(inp.value));
  selected.sort();

  const correctLabels = q.o.filter(o => o.c).map(o => o.l);
  correctLabels.sort();

  container.querySelectorAll('.opt-item').forEach(el => {
    el.classList.add('disabled');
    const label = el.dataset.label;
    const isC = correctLabels.includes(label);
    const isS = selected.includes(label);
    if (isC && isS) el.classList.add('correct');
    else if (isC && !isS) el.classList.add('missed');
    else if (!isC && isS) el.classList.add('wrong');
  });

  const isCorrect = JSON.stringify(selected) === JSON.stringify(correctLabels);
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `✅ <strong>回答正确！</strong><br>正确答案：<span class="fb-ans">${correctLabels.join('、')}</span>`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ <strong>回答错误</strong><br>你的答案：${selected.length ? selected.join('、') : '（未选）'}<br>正确答案：<span class="fb-ans">${correctLabels.join('、')}</span>`;
  }

  answered = true;
  answerRevealed = true;
  document.getElementById('btnShowAns').textContent = '🔒 隐藏答案';
  this.disabled = true;
  logAttempt(q, selected, correctLabels, isCorrect);
});

// ====== 显示/隐藏答案 ======
document.getElementById('btnShowAns').addEventListener('click', function () {
  const q = getQuestion();
  if (!q) return;
  const container = document.getElementById('optionsContainer');
  if (!answerRevealed) {
    const correctLabels = q.o.filter(o => o.c).map(o => o.l);
    container.querySelectorAll('.opt-item').forEach(el => {
      el.classList.add('disabled');
      if (correctLabels.includes(el.dataset.label)) el.classList.add('correct');
    });
    answerRevealed = true;
    this.textContent = '🔒 隐藏答案';
  } else if (!answered) {
    container.querySelectorAll('.opt-item').forEach(el => {
      el.classList.remove('disabled', 'correct', 'wrong', 'missed');
    });
    answerRevealed = false;
    this.textContent = '👁 显示答案';
  }
});

// ====== 导航 ======
document.getElementById('btnPrev').addEventListener('click', () => { if (currentNum > 1) { currentNum--; render(); } });
document.getElementById('btnNext').addEventListener('click', () => { if (currentNum < getData().length) { currentNum++; render(); } });
document.getElementById('btnNextQ').addEventListener('click', () => { if (currentNum < getData().length) { currentNum++; render(); } });
document.getElementById('qNum').addEventListener('change', function () {
  let v = parseInt(this.value) || 1;
  const total = getData().length;
  if (v < 1) v = 1;
  if (v > total) v = total;
  currentNum = v;
  render();
});

// ====== Tab 切换 ======
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  currentNum = 1;
  render();
});

// ====== 日志管理 ======
function loadLogs() {
  try { logs = JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch { logs = []; }
}
function saveLogs() {
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));
  renderLogStats();
  renderLogTable();
  document.getElementById('hintLogCount').textContent = `日志: ${logs.length} 条`;
}
function logAttempt(q, selected, correct, isCorrect) {
  loadLogs();
  logs.push({
    time: new Date().toLocaleString('zh-CN'),
    qid: q.i, type: typeLabel(currentType), summary: q.s || '',
    userAns: selected.join('、') || '（未选）',
    correctAns: correct.join('、'),
    result: isCorrect ? '✓' : '✗'
  });
  saveLogs();
}
function renderLogStats() {
  const total = logs.length;
  const correct = logs.filter(l => l.result === '✓').length;
  const wrong = total - correct;
  const rate = total ? (correct / total * 100).toFixed(1) : 0;
  const singleN = logs.filter(l => l.qid.startsWith('single')).length;
  const multiN = logs.filter(l => l.qid.startsWith('multi')).length;
  const judgeN = logs.filter(l => l.qid.startsWith('judge')).length;
  document.getElementById('logStats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">总答题数</div></div>
    <div class="stat-card"><div class="num green">${correct}</div><div class="label">正确数</div></div>
    <div class="stat-card"><div class="num red">${wrong}</div><div class="label">错误数</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="label">正确率</div></div>
    <div class="stat-card"><div class="num">${singleN}</div><div class="label">单选</div></div>
    <div class="stat-card"><div class="num">${multiN}</div><div class="label">多选</div></div>
    <div class="stat-card"><div class="num">${judgeN}</div><div class="label">判断</div></div>`;
}
function renderLogTable() {
  const tbody = document.getElementById('logBody');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:20px;">暂无答题记录</td></tr>';
    return;
  }
  const recent = [...logs].reverse().slice(0, 100);
  tbody.innerHTML = recent.map(l => `<tr>
    <td>${l.time}</td><td><strong>${l.qid}</strong></td>
    <td>${l.userAns}</td><td>${l.correctAns}</td>
    <td><span class="badge ${l.result === '✓' ? 'badge-ok' : 'badge-fail'}">${l.result === '✓' ? '正确' : '错误'}</span></td>
  </tr>`).join('');
}
document.getElementById('btnExportLog').addEventListener('click', () => {
  if (!logs.length) { alert('暂无日志可导出'); return; }
  let csv = '\uFEFF时间,题号,题型,你的答案,正确答案,结果\n';
  logs.forEach(l => { csv += `"${l.time}","${l.qid}","${l.type}","${l.userAns}","${l.correctAns}","${l.result === '✓' ? '正确' : '错误'}"\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `答题日志_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});
document.getElementById('btnClearLog').addEventListener('click', () => {
  if (logs.length && confirm('确定清空所有答题记录？')) { logs = []; saveLogs(); }
});
document.getElementById('logToggle').addEventListener('click', () => {
  document.getElementById('logSection').classList.toggle('open');
  document.getElementById('logArrow').classList.toggle('open');
});

// ====== 键盘快捷键 ======
document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'ArrowLeft') document.getElementById('btnPrev').click();
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); document.getElementById('btnNext').click(); }
  if (e.key === 'Enter') document.getElementById('btnSubmit').click();
  if (e.key === 'a' || e.key === 'A') document.getElementById('btnShowAns').click();
});

// ====== 初始化 ======
function init() {
  if (typeof QUESTION_DATA === 'undefined') {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--danger);font-size:40px;margin-bottom:12px;">⚠</div>' +
      '<div style="color:var(--text-light)">题库数据加载失败</div>' +
      '<div style="margin-top:12px;font-size:13px;color:var(--text-light)">' +
      '请确保 data.js 与 index.html 在同一目录</div>';
    return;
  }
  DATA.single = QUESTION_DATA.s;
  DATA.multi = QUESTION_DATA.m;
  DATA.judge = QUESTION_DATA.j;

  const s = DATA.single.length, m = DATA.multi.length, j = DATA.judge.length;
  document.getElementById('countSingle').textContent = s;
  document.getElementById('countMulti').textContent = m;
  document.getElementById('countJudge').textContent = j;
  document.getElementById('hintTotal').textContent = `题库: ${s + m + j} 题`;

  loadLogs();
  renderLogStats();
  renderLogTable();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render();
}

init();
</script>
</body>
</html>
